<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>The Runner - Prototype</title>
  <style>
    :root {
      --bg: #05070d;
      --panel: rgba(10, 14, 24, 0.9);
      --panel-2: rgba(19, 24, 39, 0.96);
      --line: rgba(255, 208, 75, 0.18);
      --gold: #ffc857;
      --cyan: #61f4ff;
      --pink: #ff4f8a;
      --red: #ff5a5a;
      --green: #69ff97;
      --text: #f5f3eb;
      --muted: #8e9ab0;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
      --radius: 26px;
      --phone-w: 414px;
      --phone-h: 896px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(67, 109, 193, 0.2), transparent 40%),
        radial-gradient(circle at bottom, rgba(255, 79, 138, 0.12), transparent 45%),
        linear-gradient(180deg, #04050a 0%, #080d17 55%, #030409 100%);
      color: var(--text);
      font-family: "Trebuchet MS", "Lucida Sans Unicode", "Segoe UI", sans-serif;
      padding: 12px;
    }

    .phone {
      width: min(100%, var(--phone-w));
      height: min(100vh - 24px, var(--phone-h));
      border-radius: 38px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(20, 25, 38, 0.78), rgba(5, 8, 16, 0.96)),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.65);
      isolation: isolate;
    }

    .phone::before,
    .phone::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .phone::before {
      background:
        radial-gradient(circle at 20% 20%, rgba(97, 244, 255, 0.06), transparent 28%),
        radial-gradient(circle at 75% 10%, rgba(255, 79, 138, 0.07), transparent 24%),
        radial-gradient(circle at 70% 75%, rgba(255, 200, 87, 0.06), transparent 22%);
      z-index: -1;
    }

    .phone::after {
      background-image: linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 100% 3px;
      opacity: 0.2;
      mix-blend-mode: soft-light;
    }

    .status-bar {
      padding: 16px 18px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .close-battle {
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.85;
    }

    .test-battle-btn {
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ffffff;
      font-size: 0.78rem;
      font-weight: 900;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
    }

    .screen {
      height: calc(100% - 50px);
      display: flex;
      flex-direction: column;
      padding: 0 18px 18px;
      gap: 14px;
    }

    .bottom-nav,
    .panel,
    .battle-side,
    .map-card,
    .deck-card,
    .reward-card,
    .round-overlay {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .top-panel,
    .bottom-nav,
    .top-panel {
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      padding: 0;
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr;
      gap: 6px;
    }

    .stat-chip {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(8, 13, 22, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.06);
      min-height: 28px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .hud-mini {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #f1f4fa;
      white-space: nowrap;
    }

    .xp-chip {
      justify-content: flex-start;
      gap: 8px;
    }

    .xp-bar,
    .hp-fill,
    .path-progress {
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      margin-top: 3px;
    }

    .xp-fill,
    .hp-fill,
    .path-progress > span {
      display: block;
      height: 100%;
      border-radius: inherit;
    }

    .xp-fill {
      background: linear-gradient(90deg, var(--cyan), var(--gold));
      box-shadow: 0 0 18px rgba(97, 244, 255, 0.38);
    }

    .xp-shell {
      flex: 1;
      min-width: 0;
    }

    .xp-shell .xp-bar {
      margin-top: 0;
    }

    .home-hero {
      flex: 1;
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(97, 244, 255, 0.05), transparent 34%),
        linear-gradient(180deg, rgba(13, 18, 30, 0.98), rgba(5, 7, 13, 0.99));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .skyline,
    .road,
    .car-lights,
    .gas-sign {
      display: none;
    }

    .skyline {
      bottom: 34%;
      height: 28%;
      background:
        linear-gradient(90deg,
          transparent 0 5%,
          rgba(9, 16, 32, 0.95) 5% 12%,
          transparent 12% 14%,
          rgba(12, 19, 38, 0.95) 14% 24%,
          transparent 24% 28%,
          rgba(8, 16, 34, 0.96) 28% 38%,
          transparent 38% 41%,
          rgba(12, 22, 45, 0.92) 41% 49%,
          transparent 49% 53%,
          rgba(8, 14, 28, 0.95) 53% 67%,
          transparent 67% 69%,
          rgba(11, 18, 35, 0.92) 69% 77%,
          transparent 77% 81%,
          rgba(7, 14, 25, 0.95) 81% 92%,
          transparent 92%);
      box-shadow: inset 0 -24px 60px rgba(0, 0, 0, 0.5);
    }

    .skyline::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255, 218, 141, 0.8) 0 1px, transparent 1.7px);
      background-size: 22px 22px;
      opacity: 0.35;
    }

    .road {
      bottom: 0;
      height: 42%;
      background:
        linear-gradient(180deg, rgba(8, 13, 22, 0) 0%, rgba(7, 12, 22, 0.5) 26%, rgba(3, 4, 9, 0.96) 86%),
        linear-gradient(90deg, transparent 0 47%, rgba(255, 208, 87, 0.8) 47% 53%, transparent 53%);
      clip-path: polygon(28% 0, 72% 0, 100% 100%, 0 100%);
      opacity: 0.9;
    }

    .car-lights {
      bottom: 11%;
      height: 110px;
      background:
        radial-gradient(circle at 34% 80%, rgba(255, 88, 88, 0.68), transparent 10%),
        radial-gradient(circle at 66% 82%, rgba(97, 244, 255, 0.75), transparent 10%),
        radial-gradient(circle at 56% 88%, rgba(255, 208, 87, 0.7), transparent 6%),
        linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.03));
      filter: blur(2px);
      animation: pulse 3.8s infinite ease-in-out;
    }

    .gas-sign {
      top: 18%;
      right: 8%;
      left: auto;
      width: 84px;
      height: 140px;
      border-radius: 20px 20px 8px 8px;
      background:
        linear-gradient(180deg, rgba(255, 79, 138, 0.6), rgba(255, 79, 138, 0.04)),
        rgba(7, 8, 18, 0.85);
      border: 1px solid rgba(255, 79, 138, 0.4);
      box-shadow: 0 0 28px rgba(255, 79, 138, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffd8e6;
      font-weight: 800;
      letter-spacing: 0.18em;
      writing-mode: vertical-rl;
      text-orientation: upright;
      text-transform: uppercase;
    }

    .home-copy {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      justify-content: center;
      padding-bottom: 18px;
    }

    .bottom-area {
      display: grid;
      gap: 4px;
    }

    .test-run-picker {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 5px;
      padding: 3px 6px;
      border-radius: 9px;
      background: rgba(5, 8, 16, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .test-run-picker span {
      color: #aeb9cb;
      font-size: 0.5rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .test-run-picker select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 7px;
      background: #121927;
      color: #eef2fb;
      padding: 3px 6px;
      font-size: 0.62rem;
      font-weight: 800;
      outline: none;
    }

    .test-run-picker option {
      background: #121927;
      color: #eef2fb;
    }

    .test-run-picker button {
      min-width: 34px;
      padding: 4px 7px;
      border-radius: 7px;
      font-size: 0.56rem;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--gold), #ff8f5e);
      color: #231604;
      box-shadow: none;
    }

    .home-main-view {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding-top: 54px;
    }

    .message-list {
      flex: 1;
      padding: 10px 0 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: auto;
    }

    .conversation-tile {
      width: 100%;
      border-radius: 20px;
      padding: 14px;
      background: rgba(15, 20, 31, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.075);
      display: grid;
      grid-template-columns: 52px 1fr auto;
      gap: 12px;
      align-items: center;
      color: inherit;
      text-align: left;
      box-shadow: none;
    }

    .conversation-tile.archived {
      background: rgba(11, 15, 24, 0.58);
      border-color: rgba(255, 255, 255, 0.04);
      opacity: 0.54;
      filter: grayscale(0.65);
      cursor: default;
    }

    .conversation-tile.archived:hover,
    .conversation-tile.archived:active {
      transform: none;
    }

    .chat-avatar {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(255, 200, 95, 0.2), rgba(255, 200, 95, 0.06));
      border: 1px solid rgba(255, 200, 95, 0.22);
      color: var(--gold);
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: 0.1em;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .chat-avatar.boss-face {
      background:
        linear-gradient(180deg, rgba(255, 200, 95, 0.1), rgba(255, 200, 95, 0.02)),
        url("runner_files/spades_boss_02_avatar.png") center / cover no-repeat;
      border-color: rgba(255, 200, 95, 0.34);
      color: transparent;
    }

    .chat-avatar.contact-face {
      background:
        linear-gradient(180deg, rgba(255, 200, 95, 0.08), rgba(255, 200, 95, 0.02)),
        var(--contact-avatar) center / cover no-repeat;
      color: transparent;
    }

    .tile-copy {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .tile-copy .eyebrow-mini {
      color: #b9c4d8;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .tile-copy strong {
      font-size: 0.9rem;
      letter-spacing: 0.04em;
    }

    .tile-copy span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .tile-state {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      border-radius: 999px;
      background: rgba(255, 79, 138, 0.18);
      color: #ff78ab;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .chat-overlay {
      position: absolute;
      inset: 18px;
      z-index: 5;
      background: rgba(4, 7, 14, 0.78);
      backdrop-filter: blur(14px);
      display: none;
      align-items: stretch;
      justify-content: center;
      border-radius: 28px;
    }

    .chat-overlay.open {
      display: flex;
    }

    .chat-panel {
      width: 100%;
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(8, 12, 21, 0.98), rgba(6, 9, 17, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .chat-head {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
    }

    .chat-head .chat-avatar {
      width: 42px;
      height: 42px;
      border-radius: 14px;
    }

    .chat-head strong {
      display: block;
      font-size: 0.92rem;
      letter-spacing: 0.04em;
    }

    .chat-head span {
      display: block;
      color: var(--muted);
      font-size: 0.74rem;
      margin-top: 2px;
    }

    .chat-scroll {
      flex: 1;
      min-height: 0;
      padding: 16px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        radial-gradient(circle at top, rgba(121, 231, 255, 0.04), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0));
    }

    .bubble {
      max-width: 84%;
      padding: 12px 14px;
      border-radius: 18px;
      font-size: 0.94rem;
      line-height: 1.4;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
      animation: chatIn 0.26s ease;
    }

    .bubble.boss {
      align-self: flex-start;
      background: rgba(22, 30, 46, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom-left-radius: 8px;
    }

    .bubble.player {
      align-self: flex-end;
      background: linear-gradient(180deg, rgba(255, 200, 95, 0.96), rgba(255, 156, 88, 0.96));
      color: #231604;
      border-bottom-right-radius: 8px;
    }

    .tap-hint {
      margin-top: auto;
      padding: 12px 16px 18px;
      text-align: center;
      color: #ffd88a;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: pulse 1.1s infinite ease-in-out;
    }

    .home-run-label {
      position: absolute;
      top: 42px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(185, 196, 216, 0.94);
      text-align: center;
    }

    .new-game-link {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(185, 196, 216, 0.92);
      cursor: pointer;
      user-select: none;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15, 20, 31, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.075);
      box-shadow: none;
    }

    .new-game-link:hover {
      color: rgba(255, 255, 255, 1);
      border-color: rgba(255, 208, 87, 0.42);
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .title {
      font-size: 2rem;
      line-height: 0.92;
      max-width: 210px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .subtitle {
      color: #d3dae7;
      font-size: 0.92rem;
      line-height: 1.45;
      max-width: 240px;
      margin-bottom: 18px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }

    button:hover,
    button:active {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--gold), #ff8f5e);
      color: #231604;
      box-shadow: 0 12px 26px rgba(255, 143, 94, 0.28);
    }

    .secondary-btn {
      background: linear-gradient(135deg, rgba(97, 244, 255, 0.92), rgba(79, 132, 255, 0.85));
      color: #04101d;
      box-shadow: 0 12px 26px rgba(79, 132, 255, 0.24);
    }

    .ghost-btn {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .ghost-btn.jackpot {
      background: linear-gradient(180deg, rgba(255, 214, 102, 0.96), rgba(255, 167, 79, 0.92));
      color: #261507;
      border-color: rgba(255, 220, 128, 0.42);
      box-shadow: 0 12px 28px rgba(255, 186, 91, 0.28);
    }

    .bottom-nav {
      border-radius: 24px;
      padding: 10px 8px 12px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      min-height: 80px;
    }

    .nav-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 18px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .nav-item.active {
      background: rgba(255, 208, 87, 0.11);
      color: var(--gold);
    }

    .nav-item.locked {
      filter: grayscale(0.8);
      opacity: 0.45;
    }

    .upgrade-badge {
      position: absolute;
      top: 7px;
      right: 10px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff3859, #c70f31);
      color: #fff;
      border: 1px solid rgba(255, 190, 198, 0.72);
      box-shadow: 0 0 10px rgba(255, 56, 89, 0.42);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.64rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      z-index: 4;
    }

    .screen-stack {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel,
    .reward-card {
      border-radius: 24px;
      padding: 16px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 8px;
    }

    .map-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: linear-gradient(180deg, rgba(6, 9, 16, 0.72), rgba(6, 9, 16, 0.82));
      overflow: hidden;
      position: relative;
      margin-left: -18px;
      margin-right: -18px;
      border-radius: 0;
      border-left: none;
      border-right: none;
    }

    .map-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: url("runner_files/map_bg.png") center/cover no-repeat;
      z-index: 0;
      pointer-events: none;
    }

    .map-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 12%, rgba(255, 208, 87, 0.07), transparent 18%),
        radial-gradient(circle at 78% 8%, rgba(97, 244, 255, 0.09), transparent 22%),
        linear-gradient(180deg, transparent 60%, rgba(255, 79, 138, 0.06) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .map-top,
    .battle-head,
    .deck-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .map-svg-wrap {
      flex: 1;
      position: relative;
      z-index: 1;
      min-height: 240px;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .map-legend {
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 1;

      text-transform: none;

      align-items: center;
      justify-content: center;
      padding: 16px;
      cursor: pointer;

      border-radius: 26px;
      background: var(--zoom-art) center / contain no-repeat;
      box-shadow: 0 26px 54px rgba(0, 0, 0, 0.4);
    }

    .upgrade-choice {
      position: absolute;
      inset: 50% 12px auto;
      transform: translateY(-50%);
      z-index: 7;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      border-radius: 26px;
      background: rgba(7, 11, 19, 0.95);

      letter-spacing: 0.08em;
      font-size: 1rem;
      text-align: center;
    }

    .upgrade-choice p {

      font-size: 0.78rem;
      text-align: center;
    }

    .upgrade-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .upgrade-option {
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.02));

      text-align: left;
      cursor: pointer;
      padding: 0;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),

      transform: translateY(1px);

    @media (max-width: 430px) {

      }

          nitroRun2: false
        },
        collectionFocus: null,
        collectionImageFocus: null,
        reward: null,
        roundSummary: null,
        roundReveal: null,
        pendingRoundResult: null,
        battle: null,
        logs: ["Miasto nie Ĺ›pi. Kurier rusza na pierwszÄ… trasÄ™."]
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function normalizeState() {
      if (typeof state.player.currentHp !== "number") {
        state.player.currentHp = playerMaxHp();
      }
      if (!("hpBalanceVersion" in state) || state.hpBalanceVersion < 3) {
        state.player.currentHp = playerMaxHp();
        state.hpBalanceVersion = 3;
      } else {
        state.player.currentHp = Math.min(state.player.currentHp, playerMaxHp());
      }
      if (typeof state.runRoundCount !== "number" || Number.isNaN(state.runRoundCount)) {
        state.runRoundCount = 0;
      }
      if (typeof state.stageCardCount !== "number" || Number.isNaN(state.stageCardCount)) {
        state.stageCardCount = 0;
      }
      if (!state.homeChat) {
        state.homeChat = { runId: state.selectedStage, unlocked: false, open: false, step: -1, waitingForClose: false, messages: [] };
      }
      if (typeof state.homeChat.runId !== "number" || Number.isNaN(state.homeChat.runId)) {
        state.homeChat.runId = state.selectedStage;
      }
      if (!Array.isArray(state.homeChat.messages)) {
        state.homeChat.messages = [];
      }
      if (typeof state.homeChat.unlocked !== "boolean") {
        state.homeChat.unlocked = false;
      }
      if (typeof state.homeChat.open !== "boolean") {
        state.homeChat.open = false;
      }
      if (typeof state.homeChat.step !== "number") {
        state.homeChat.step = -1;
      }
      if (typeof state.homeChat.waitingForClose !== "boolean") {
        state.homeChat.waitingForClose = false;
      }
      if (!state.runBuffs) {
        state.runBuffs = defaultRunBuffs();
      }
      if (!state.runUpgradeCounts) {
        state.runUpgradeCounts = defaultRunUpgradeCounts();
      }
      if (!state.runBuffs.suit) {
        state.runBuffs.suit = defaultRunBuffs().suit;
      }
      if (!state.runBuffs.rank) {
        state.runBuffs.rank = defaultRunBuffs().rank;
      }
      for (const suit of Object.keys(SUITS)) {
        if (typeof state.runBuffs.suit[suit] !== "number") {
          state.runBuffs.suit[suit] = 0;
        }
      }
      for (const rank of ["K", "Q", "J"]) {
        if (typeof state.runBuffs.rank[rank] !== "number") {
          state.runBuffs.rank[rank] = 0;
        }
      }
      for (const key of ["pair", "trips", "blackjack", "stageCards", "stageHeal"]) {
        if (typeof state.runBuffs[key] !== "number") {
          state.runBuffs[key] = 0;
        }
      }
      for (const upgrade of RUN_UPGRADES) {
        if (typeof state.runUpgradeCounts[upgrade.id] !== "number") {
          state.runUpgradeCounts[upgrade.id] = 0;
        }
      }
      if (!("upgradeChoice" in state)) {
        state.upgradeChoice = null;
      }
      if (!("pendingRoundResult" in state)) {
        state.pendingRoundResult = null;
      }
      if (state.reward?.cards?.length && !Array.isArray(state.reward.revealedCards)) {
        state.reward.revealedCards = state.reward.cards.map(() => false);
      }
      if (!state.deckSuit || !SUITS[state.deckSuit]) {
        state.deckSuit = "hearts";
      }
      if (!state.deckLevels) {
        state.deckLevels = defaultDeckLevels();
      }
      if (!state.deckCopies) {
        state.deckCopies = defaultDeckCopies();
      }
      if (!state.cardMemories) {
        state.cardMemories = {};
      }
      if (!("deckFocus" in state)) {
        state.deckFocus = null;
      }
      if (!("deckMemoryPickerOpen" in state)) {
        state.deckMemoryPickerOpen = false;
      }
      if (!state.collections) {
        state.collections = { nitro: { stars: 0, photosUnlocked: 0 } };
      }
      if (!state.collections.nitro) {
        state.collections.nitro = { stars: 0, photosUnlocked: 0 };
      }
      if (!state.memoryRewardsClaimed) {
        state.memoryRewardsClaimed = { nitroRun2: false };
      }
      if (!("nitroRun2" in state.memoryRewardsClaimed)) {
        state.memoryRewardsClaimed.nitroRun2 = false;
      }
      if (state.memoryRewardsClaimed.nitroRun2) {
        const legacyUnlock = getRunMemoryUnlocks(2)[0];
        if (legacyUnlock) {
          state.memoryRewardsClaimed[getMemoryRewardKey(legacyUnlock)] = true;
        }
        state.collections.nitro.stars = Math.min(5, Math.max(state.collections.nitro.stars || 0, 1));
        state.collections.nitro.photosUnlocked = Math.max(state.collections.nitro.photosUnlocked || 0, 1);
      }
      if (!("collectionFocus" in state)) {
        state.collectionFocus = null;
      }
      if (!("collectionImageFocus" in state)) {
        state.collectionImageFocus = null;
      }
      for (const suit of Object.keys(SUITS)) {
        for (const rank of RANKS) {
          const key = cardKey(rank, suit);
          if (typeof state.deckLevels[key] !== "number") {
            state.deckLevels[key] = 1;
          }
          if (typeof state.deckCopies[key] !== "number" || Number.isNaN(state.deckCopies[key])) {
            state.deckCopies[key] = 0;
          }
        }
      }
    }

    function tickClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
    }

    function render() {
      if (!isHpAnimating) {
        saveState();
      }
      closeBattleEl.style.display = state.screen === "battle" ? "inline-flex" : "none";
      healBattleEl.style.display = state.screen === "battle" ? "inline-flex" : "none";
      skipBattleStageEl.style.display = state.screen === "battle" ? "inline-flex" : "none";
      const battle = state.screen === "battle" ? renderBattle() : "";
      const map = state.screen === "map" ? renderMap() : "";
      const home = state.screen === "home" && state.subScreen === "main" ? renderHome() : "";
      const deck = state.screen === "home" && state.subScreen === "deck" ? renderDeck() : "";
      const collections = state.screen === "home" && state.subScreen === "collections" ? renderCollections() : "";
      app.innerHTML = `
        ${renderTopPanel()}
        <div class="screen-stack">
          ${home || deck || collections || map || battle}
        </div>
        ${state.reward ? renderReward() : ""}
        ${state.upgradeChoice ? renderUpgradeChoice() : ""}
        ${state.deckFocus ? renderDeckFocus() : ""}
        ${state.deckFocus && state.deckMemoryPickerOpen ? renderDeckMemoryPickerPopup() : ""}
        ${state.collectionFocus ? renderCollectionAlbum() : ""}
        ${state.collectionImageFocus ? renderCollectionImageZoom() : ""}
        ${renderBottomNav()}
      `;
      bindEvents();
    }

    function renderTopPanel() {
      const xpPct = Math.min(100, (state.player.xp / state.player.xpToNext) * 100);
      return `
        <div class="top-panel">
          <div class="stat-chip xp-chip">
            <div class="hud-mini">LV ${state.player.level}</div>
            <div class="xp-shell">
              <div class="xp-bar"><span class="xp-fill" style="width:${xpPct}%"></span></div>
            </div>
          </div>
          <div class="stat-chip">
            <div class="hud-mini">$${state.player.soft}</div>
          </div>
          <div class="stat-chip">
            <div class="hud-mini">\u25C6 ${state.player.gems}</div>
          </div>
        </div>
      `;
    }

    function renderBottomNav() {
      const current = state.screen === "home" ? state.subScreen : "main";
      const runOptions = STAGES.map(stage => `<option value="${stage.id}" ${state.selectedStage === stage.id ? "selected" : ""}>Run ${stage.id}</option>`).join("");
      const runPicker = state.screen === "home" && state.subScreen === "main" ? `
        <label class="test-run-picker">
          <span>Test</span>
          <select data-run-picker>${runOptions}</select>
          <button type="button" data-run-go>GO</button>
        </label>
      ` : "";
      return `
        <div class="bottom-area">
          <div class="bottom-nav">
            ${navItem("shop", "SHOP", "\u25C8", false)}
            ${navItem("deck", "DECK", "\uD83C\uDCA0", true, current === "deck", hasUpgradeableCards())}
            ${navItem("main", "MAIN", "\u2302", true, current === "main")}
            ${navItem("collections", "COLLECTIONS", "\u2699", true, current === "collections")}
            ${navItem("friends", "FRIENDS", "\u2736", false)}
          </div>
          ${runPicker}
        </div>
      `;
    }

    function navItem(id, label, icon, unlocked, active = false, showBadge = false) {
      return `
        <div class="nav-item ${active ? "active" : ""} ${unlocked ? "" : "locked"}" data-nav="${unlocked ? id : ""}">
          <div>${icon}</div>
          <div>${label}</div>
          ${showBadge ? `<span class="upgrade-badge">!</span>` : ""}
        </div>
      `;
    }

    function renderHome() {
      const chat = state.homeChat;
      const statusText = chat.unlocked ? "Rozmowa odczytana. Trasa odblokowana." : "Tapnij, aby odczytać instrukcje.";
      const tileState = chat.unlocked ? "&#10003;" : "1";
      const bubbles = chat.messages.map(item => `<div class="bubble ${item.speaker}">${item.text}</div>`).join("");
      const contact = getRunContact(state.selectedStage);
      const archivedThreads = renderArchivedRunThreads();
      return `
        <section class="home-hero">
          <div class="new-game-link" data-action="new-game">New Game</div>
          <div class="home-run-label">RUN ${state.selectedStage} - ${Math.min(currentStageNodeCount(), state.currentNode + 1)}</div>
          <div class="home-main-view">
            <div class="message-list">
              <button class="conversation-tile" data-action="open-boss-chat">
                <div class="chat-avatar contact-face" ${contactAvatarStyle(contact)}>${contact.name[0] || "?"}</div>
                <div class="tile-copy">
                  <span class="eyebrow-mini">Nowa wiadomość od:</span>
                  <strong>${contact.name}</strong>
                  <span>${statusText}</span>
                </div>
                <div class="tile-state" style="${chat.unlocked ? "background:rgba(127, 231, 191, 0.18); color:#7fe7bf;" : ""}">${tileState}</div>
              </button>
              ${archivedThreads}
            </div>
            <div class="home-copy">
              <button class="primary-btn" data-action="play-stage" ${chat.unlocked ? "" : "disabled"}>Play</button>
            </div>
          </div>
          <div class="chat-overlay ${chat.open ? "open" : ""}" id="homeChatOverlay">
            <div class="chat-panel">
              <div class="chat-head">
                <div class="chat-avatar contact-face" ${contactAvatarStyle(contact)}>${contact.name[0] || "?"}</div>
                <div>
                  <strong>${contact.name}</strong>
                  <span>Szyfrowany czat</span>
                </div>
              </div>
              <div class="chat-scroll">${bubbles}</div>
              <div class="tap-hint">${chat.waitingForClose ? "Tap anywhere to close" : "Tap to continue"}</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderDeck() {
      const suitTabs = Object.entries(SUITS).map(([key, suit]) => `
        <div class="deck-suit-tab ${state.deckSuit === key ? "active" : ""} ${isRedSuit(key) ? "suit-red" : ""}" data-action="deck-suit" data-suit="${key}">
          ${suit.icon}
          ${hasUpgradeableCardsInSuit(key) ? `<span class="upgrade-badge">!</span>` : ""}
        </div>
      `).join("");
      const cards = RANKS.map(rank => {
        return renderCollectionCard(rank, state.deckSuit, { clickable: true });
      }).join("");
      return `
        <section class="panel" style="flex:1; display:flex; flex-direction:column; gap:12px; min-height:0;">
          <div class="deck-switch">${suitTabs}</div>
          <div class="deck-cards">${cards}</div>
        </section>
      `;
    }

    function renderCollections() {
      const collectionIds = getAllCollectionCharacterIds();
      return `
        <section class="panel collections-panel">
          <div class="meta-row">
            <span>Collections</span>
            <span>Poznane bohaterki i ich albumy</span>
          </div>
          <div class="collections-grid">
            ${collectionIds.map(characterId => {
              const character = getCharacterConfig(characterId) || { id: characterId, name: characterId, art: "" };
              const collectionState = state.collections[characterId] || { stars: 0, photosUnlocked: 0 };
              const coverArt = getCollectionCoverArt(character.id) || character.art || character.avatar || "runner_files/Karo_mechanic_01.png";
              return `
                <button class="collection-card" data-collection-open="${character.id}">
                  <div class="collection-card-top">
                    <div class="collection-name">${character.name}</div>
                  </div>
                  <div class="collection-art" style="--collection-art:url('${coverArt}'); ${collectionCropStyle(character.id)}"></div>
                  <div class="collection-copy">
                    <div class="star-row">
                      ${Array.from({ length: 5 }, (_, index) => `<span class="star-slot ${index < collectionState.stars ? "filled" : ""}">&#9733;</span>`).join("")}
                    </div>
                  </div>
                </button>
              `;
            }).join("")}
            ${collectionIds.length ? "" : `
              <div class="album-note">Brak photo memories do odblokowania.</div>
            `}
          </div>
        </section>
      `;
    }

    function getAllCollectionCharacterIds() {
      return Object.entries(state.collections || {})
        .filter(([characterId, collectionState]) => {
          return (collectionState?.photosUnlocked || 0) > 0 && getCollectionPhotos(characterId).length > 0;
        })
        .map(([characterId]) => characterId);
    }

    function getCollectionCoverArt(characterId) {
      const covers = {
        nitro: "runner_files/memories/nitro_00.png",
        velvet_rox: "runner_files/memories/roxy_00.png",
        katharina_noir: "runner_files/memories/katarina_00.png"
      };
      return covers[characterId] || "";
    }

    function collectionCropStyle(characterId) {
      if (getCollectionCoverArt(characterId)) {
        return "--collection-pos:50% 50%; --collection-size:cover;";
      }
      if (characterId === "katharina_noir") {
        return "--collection-pos:50% 8%; --collection-size:150% auto;";
      }
      return "";
    }

    function getRunMemoryUnlocks(runId) {
      const configured = getRunConfig(runId)?.memoryUnlocks || [];
      if (configured.length) {
        return configured.map((unlock, index) => ({
          runId: Number(runId),
          index,
          characterId: unlock.characterId,
          photoArt: unlock.photoArt,
          text: unlock.text || "You gained a new memory"
        }));
      }
      if (Number(runId) === 2) {
        return [{
          runId: 2,
          index: 0,
          characterId: "nitro",
          photoArt: "runner_files/memories/nitro_01.png",
          text: "Możesz obejrzeć zdobyte wspomnienia w Collections"
        }];
      }
      return [];
    }

    function getMemoryRewardKey(unlock) {
      return `run:${unlock.runId}:memory:${unlock.characterId}:${unlock.photoArt || unlock.index}`;
    }

    function getPendingMemoryUnlock(runId) {
      return getRunMemoryUnlocks(runId).find(unlock => {
        if (!unlock.characterId || !unlock.photoArt) {
          return false;
        }
        return !state.memoryRewardsClaimed?.[getMemoryRewardKey(unlock)];
      }) || null;
    }

    function getConfiguredCollectionPhotos(characterId) {
      const photos = [];
      for (const run of window.RUNNER_STAGE_DATA?.runs || []) {
        for (const unlock of run.memoryUnlocks || []) {
          if (unlock.characterId === characterId && unlock.photoArt) {
            photos.push({ art: unlock.photoArt });
          }
        }
      }
      return photos;
    }

    function uniquePhotos(photos) {
      const seen = new Set();
      return photos.filter(photo => {
        if (!photo?.art || seen.has(photo.art)) {
          return false;
        }
        seen.add(photo.art);
        return true;
      });
    }

    function getCollectionPhotos(characterId) {
      const configured = getConfiguredCollectionPhotos(characterId);
      const defaults = characterId === "nitro" ? [
        { art: "runner_files/memories/nitro_01.png" },
        { art: "runner_files/memories/nitro_02.png" },
        { art: "runner_files/memories/nitro_03.png" },
        { art: "runner_files/memories/nitro_04.png" }
      ] : [];
      return uniquePhotos([...configured, ...defaults]);
    }

    function renderMemoryPhotoCard(photo, options = {}) {
      const unlocked = Boolean(options.unlocked);
      const clickable = Boolean(options.clickable && unlocked);
      const attrs = clickable ? `data-memory-open="${options.characterId}:${options.index}"` : "";
      return `
        <div class="album-slot ${unlocked ? "unlocked" : "locked"} ${clickable ? "clickable" : ""}" ${attrs}>
          <div class="album-photo" style="--album-art:url('${photo.art}')"></div>
        </div>
      `;
    }

    function getCardMemory(key) {
      return state.cardMemories?.[key] || null;
    }

    function getUnlockedCollectionEntries() {
      const entries = [];
      for (const [characterId, collectionState] of Object.entries(state.collections || {})) {
        const photos = getCollectionPhotos(characterId);
        const unlockedCount = Math.min(collectionState?.photosUnlocked || 0, photos.length);
        if (!unlockedCount) {
          continue;
        }
        const character = getCharacterConfig(characterId) || { name: characterId, avatar: "", art: "" };
        entries.push({
          characterId,
          name: character.name,
          avatar: character.avatar || character.art || photos[0]?.art || "",
          photos: photos.slice(0, unlockedCount)
        });
      }
      return entries;
    }

    function renderCollectionAlbum() {
      const character = getCharacterConfig(state.collectionFocus) || {
        id: "nitro",
        name: "Nitro"
      };
      const collectionState = state.collections[state.collectionFocus] || { photosUnlocked: 0 };
      const photos = getCollectionPhotos(state.collectionFocus);
      return `
        <div class="album-overlay">
          <div class="album-panel">
            <div class="album-head">
              <div>
                <h3>${character.name} Album</h3>
                <p>Najpierw musisz zdoby&#263; zdj&#281;cia tej bohaterki.</p>
              </div>
              <button class="detail-close" data-action="close-collection">X</button>
            </div>
            <div class="album-grid">
              ${Array.from({ length: photos.length || 4 }, (_, index) => {
                const photo = photos[index] || { art: "runner_files/memories/nitro_01.png" };
                return renderMemoryPhotoCard(photo, {
                  unlocked: index < collectionState.photosUnlocked,
                  clickable: true,
                  characterId: state.collectionFocus,
                  index
                });
              }).join("")}
            </div>
            <div class="album-note">Na razie album jest pusty. Gdy Nitro zacznie si&#281; bardziej ods&#322;ania&#263; w fabule i eventach, tutaj pojawi&#261; si&#281; jej zdj&#281;cia.</div>
          </div>
        </div>
      `;
    }

    function renderCollectionImageZoom() {
      const focus = state.collectionImageFocus;
      return `
        <div class="memory-zoom-overlay" data-action="close-memory-view">
          <div class="memory-zoom-image" style="--zoom-art:url('${focus.art}')"></div>
        </div>
      `;
    }

    function renderCollectionCard(rank, suitKey, options = {}) {
      const key = cardKey(rank, suitKey);
      const level = state.deckLevels[key] || 1;
      const copies = state.deckCopies[key] || 0;
      const suit = SUITS[suitKey];
      const red = isRedSuit(suitKey);
      const needed = copiesNeededForNextLevel(level);
      const ratio = progressRatio(level, copies);
      const progressFrom = Number.isFinite(options.progressFromRatio) ? Math.max(0, Math.min(100, options.progressFromRatio)) : ratio;
      const progressTo = Number.isFinite(options.progressToRatio) ? Math.max(0, Math.min(100, options.progressToRatio)) : ratio;
      const progressAnimated = Boolean(options.progressAnimated);
      const progressWidth = progressAnimated ? progressFrom : progressTo;
      const canUpgrade = canUpgradeCard(key);
      const memory = "memoryOverride" in options ? options.memoryOverride : getCardMemory(key);
      const wrapperActionAttr = options.clickable ? `data-card-focus="${key}"` : "";
      const hideFooter = Boolean(options.hideFooter);
      const displayDamage = cardPreviewDamage(rank, suitKey, { includeMemory: options.includeMemoryDamage !== false });
      return `
        <div class="deck-card-shell" ${wrapperActionAttr}>
          <div class="deck-play-card ${red ? "red" : ""} ${memory ? "has-memory" : ""}">
            <div class="deck-card-surface" ${memory ? `style="--card-memory-art:url('${memory.art}')"` : ""}>
              <div class="deck-card-photo"></div>
            </div>
            <div class="deck-card-content">
              <div class="deck-card-top">
                <div class="deck-card-face">
                  <div class="deck-rank">${rank}</div>
                  <div class="deck-suit">${suit.icon}</div>
                </div>
              </div>
            </div>
            ${canUpgrade && options.showUpgrade !== false ? `<span class="upgrade-arrow">↑</span>` : ""}
          </div>
          ${hideFooter ? "" : `
            <div class="deck-under-meta">
              <div class="deck-under-dmg">DMG ${displayDamage} <span>LVL ${level}</span></div>
              <div class="card-progress ${progressAnimated ? "animated" : ""}"><span style="--progress-from:${progressFrom}%; --progress-to:${progressTo}%; width:${progressWidth}%;"></span>${needed ? `<div class="card-progress-label">${copies} / ${needed}</div>` : `<div class="card-progress-label">MAX</div>`}</div>
            </div>
          `}
        </div>
      `;
    }

    function renderDeckFocus() {
      const [rank, suitKey] = state.deckFocus.split("_");
      const key = state.deckFocus;
      const level = state.deckLevels[key] || 1;
      const copies = state.deckCopies[key] || 0;
      const needed = copiesNeededForNextLevel(level);
      const upgradeCost = upgradeCostForLevel(level);
      const canUpgrade = canUpgradeCard(key);
      const canAfford = canAffordCardUpgrade(key);
      const ready = canUpgrade && canAfford;
      const nextLevel = CARD_LEVELS[level + 1];
      const memory = getCardMemory(key);
      const baseDamage = cardPreviewDamage(rank, suitKey, { includeMemory: false });
      const totalDamage = cardPreviewDamage(rank, suitKey);
      return `
        <div class="deck-detail-overlay">
          <div class="deck-detail-panel">
            <div class="deck-detail-head">
              <div>
                <h3>${rank} ${SUITS[suitKey].name}</h3>
              </div>
              <button class="detail-close" data-action="close-deck-focus">X</button>
            </div>
            <div class="deck-detail-card-wrap">
              <div></div>
              ${renderCollectionCard(rank, suitKey, { hideFooter: true })}
              ${memory ? `<div class="photo-bonus-note">Photo<span>+${MEMORY_PHOTO_DAMAGE_BONUS} damage</span></div>` : `<div></div>`}
            </div>
            <div class="deck-memory-row">
              <button class="memory-link-btn" data-action="toggle-deck-memory-picker">${memory ? "Zmien photo" : "Dodaj photo"}</button>
              ${memory ? `<button class="memory-remove-btn" data-action="remove-card-photo">Remove Photo</button>` : ""}
            </div>
            <div class="deck-detail-stats">
              <div class="deck-stat">
                <div class="deck-stat-label">Poziom</div>
                <div class="deck-stat-value">Lv ${level}</div>
              </div>
              <div class="deck-stat">
                <div class="deck-stat-label">DMG</div>
                <div class="deck-stat-value">${totalDamage}</div>
              </div>
              <div class="deck-stat">
                <div class="deck-stat-label">Bazowy</div>
                <div class="deck-stat-value">${baseDamage}</div>
              </div>
            </div>
            <div class="deck-detail-progress">
              <div class="card-collection-meta">
                <span>${needed ? `Duplikaty ${copies} / ${needed}` : "Karta na maksie"}</span>
                <span>${upgradeCost ? `Koszt $${upgradeCost}` : "Brak dalszego upgrade'u"}</span>
              </div>
              <div class="card-progress"><span style="width:${progressRatio(level, copies)}%;"></span></div>
            </div>
            <button class="upgrade-btn ${ready ? "ready" : ""}" data-action="upgrade-card" ${ready ? "" : "disabled"}>
              ${!needed ? "Max level" : ready ? `Upgrade za $${upgradeCost}` : canUpgrade ? `Brakuje $${Math.max(0, upgradeCost - state.player.soft)}` : `Potrzeba ${Math.max(0, needed - copies)} duplikat&#243;w`}
            </button>
          </div>
        </div>
      `;
    }

    function renderDeckMemoryPickerPopup() {
      const key = state.deckFocus;
      const memory = getCardMemory(key);
      const memoryEntries = getUnlockedCollectionEntries();
      return `
        <div class="memory-picker-overlay">
          <div class="memory-picker-popup">
            <div class="memory-picker-head">
              <div class="memory-picker-title">Przypisz photo do tej karty</div>
              <button class="detail-close" data-action="toggle-deck-memory-picker">X</button>
            </div>
            <div class="memory-picker-scroll">
              ${memoryEntries.length ? memoryEntries.map(entry => `
                <div class="memory-picker-row">
                  <div class="memory-picker-character">
                    <div class="memory-picker-avatar" style="--memory-avatar:url('${entry.avatar}')"></div>
                    <div class="memory-picker-name">${entry.name}</div>
                  </div>
                  <div class="memory-picker-photos">
                    ${entry.photos.map((photo, index) => `
                      <button class="memory-thumb ${memory?.characterId === entry.characterId && memory?.index === index ? "selected" : ""}" data-memory-assign="${key}:${entry.characterId}:${index}">
                        <div class="memory-thumb-photo" style="--thumb-art:url('${photo.art}')"></div>
                      </button>
                    `).join("")}
                  </div>
                </div>
              `).join("") : `<div class="album-note">Najpierw odblokuj photo w Collections.</div>`}
            </div>
          </div>
        </div>
      `;
    }

    function renderMap() {
      const stage = getCurrentStage();
      if (!stage.enemies.length) {
        return `
          <section class="map-card">
            <div class="map-top">
              <div class="map-title-block">
                <div class="label">RUN ${stage.id}</div>
                <h2>${stage.subtitle || stage.name}</h2>
              </div>
            </div>
            <div class="map-legend">
              <button class="primary-btn" data-nav="main">Back</button>
            </div>
          </section>
        `;
      }
      const layout = getMapLayout(stage.id);
      const currentStageNumber = Math.min(stage.enemies.length, state.currentNode + 1);
      const runUpgradeIcons = renderRunUpgradeIcons();
      const nodes = stage.enemies.map((enemy, index) => {
        const point = layout.nodes[index] || layout.nodes[layout.nodes.length - 1];
        const x = point.x;
        const y = point.y;
        const cleared = index < state.currentNode;
        const active = index === state.currentNode;
        const fill = cleared ? "#61f4ff" : active ? "#ffc857" : "rgba(255,255,255,0.18)";
        return `
          <g>
            <circle cx="${x}" cy="${y}" r="${active ? 18 : 13}" fill="${fill}" stroke="rgba(255,255,255,0.2)" stroke-width="3"></circle>
            <text x="${x}" y="${y + 5}" text-anchor="middle" fill="#071018" font-size="11" font-weight="800">${index + 1}</text>
          </g>
        `;
      }).join("");
      const playerPos = state.currentNode >= stage.enemies.length
        ? layout.nodes[layout.nodes.length - 1]
        : layout.nodes[state.currentNode];
      const progressPct = Math.min(100, (state.currentNode / stage.enemies.length) * 100);
      return `
        <section class="map-card">
          <div class="map-top">
            <div class="map-title-block">
              <div class="label">RUN ${stage.id}</div>
              <h2>Stage ${stage.id}-${currentStageNumber}</h2>
              ${runUpgradeIcons}
            </div>
          </div>
          <div class="path-progress"><span style="width:${progressPct}%; background:linear-gradient(90deg, var(--gold), var(--cyan));"></span></div>
          <div class="map-svg-wrap">
            <svg viewBox="0 0 414 540" aria-label="Mapa miasta">
              <defs>
                <linearGradient id="pathLine" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#ffd057"></stop>
                  <stop offset="100%" stop-color="#ff7e5f"></stop>
                </linearGradient>
              </defs>
              <rect x="0" y="0" width="414" height="540" rx="30" fill="rgba(5, 10, 19, 0.12)"></rect>
              <circle cx="68" cy="90" r="30" fill="rgba(97,244,255,0.08)"></circle>
              <circle cx="320" cy="64" r="22" fill="rgba(255,208,87,0.08)"></circle>
              <path d="${layout.route}" fill="none" stroke="url(#pathLine)" stroke-width="10" stroke-linecap="round"></path>
              <path d="${layout.road}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="16" stroke-linecap="round"></path>
              ${nodes}
              <g transform="translate(${playerPos.x - 18} ${playerPos.y - 38})">
                <rect x="0" y="0" width="36" height="22" rx="8" fill="#08121c" stroke="rgba(255,255,255,0.24)"></rect>
                <text x="18" y="15" text-anchor="middle" fill="#61f4ff" font-size="11" font-weight="900">YOU</text>
                <circle cx="18" cy="32" r="6" fill="#61f4ff"></circle>
              </g>
            </svg>
          </div>
          <div class="map-legend">
            <button class="primary-btn" data-action="start-battle">Start</button>
          </div>
        </section>
      `;
    }

    function renderBattle() {
      const battle = state.battle;
      const enemySuit = SUITS[battle.enemy.suit];
      const enemyArtStyle = battle.enemy.art ? `style="--enemy-art:url('${battle.enemy.art}')"` : "";
      const playerHasBlackjack = handTotal(battle.player.cards) === 21;
      const summary = state.roundSummary;
      const currentStep = summary ? summary.steps[summary.currentStepIndex] : null;
      const enemyHighlights = summary ? highlightedIndexes(summary.enemy, currentStep) : [];
      const playerHighlights = summary ? highlightedIndexes(summary.player, currentStep) : [];
      const enemyNameFlash = summary && shouldFlashName(summary, "enemy", currentStep);
      const playerNameFlash = summary && shouldFlashName(summary, "player", currentStep);
      const introDialog = getActiveBattleDialog();
      return `
        <section class="battle-layout">
          <div class="battle-side">
            <div>
              <div class="hp-row">
                <div class="hp-meta">
                  <span class="suit-badge ${isRedSuit(battle.enemy.suit) ? "suit-red" : ""}">${enemySuit.icon}</span>
                  <span class="${enemyNameFlash ? "name-flash" : ""}">${battle.enemy.name}</span>
                </div>
                <strong>${battle.enemy.displayHp} / ${battle.enemy.maxHp}</strong>
              </div>
              <div class="hp-wrap">
                ${battle.enemy.recentDamage ? `<div class="damage-float">-${battle.enemy.recentDamage}</div>` : ""}
                <div class="hp-bar"><span class="hp-fill enemy-fill" style="width:${hpPct(battle.enemy.displayHp, battle.enemy.maxHp)}%"></span></div>
              </div>
            </div>
            <div class="battle-body ${battle.enemy.art ? "enemy-body-art" : ""}" ${battle.enemy.art ? enemyArtStyle : ""}>
              ${summary ? renderSideSummary(summary.enemy, "enemy") : `
                <div class="portrait ${enemySuit.colorClass} ${battle.enemy.art ? "enemy-art" : ""}" ${enemyArtStyle}>
                  <div class="portrait-figure"></div>
                </div>
              `}
              <div class="cards-area ${battle.enemy.art ? "enemy-cards-art" : ""}" ${enemyArtStyle}>
                <div class="total">Enemy total <strong>${displayTotal(battle.enemy.cards)}</strong></div>
                ${!summary && battle.enemy.passed ? `<div class="pass-indicator">Pass</div>` : ""}
                <div class="cards-stack ${summary ? "summary-active" : ""}">${renderCards(battle.enemy.cards, "enemy", summary?.winnerClass === "enemy", enemyHighlights)}</div>
              </div>
            </div>
          </div>

          <div class="battle-side">
            <div>
              <div class="hp-row">
                <div class="hp-meta">
                  <span class="suit-badge">\u2605</span>
                  <span class="${playerNameFlash ? "name-flash" : ""}">Kurier</span>
                </div>
                <strong>${battle.player.displayHp} / ${battle.player.maxHp}</strong>
              </div>
              <div class="hp-wrap">
                ${battle.player.recentDamage ? `<div class="damage-float">-${battle.player.recentDamage}</div>` : ""}
                <div class="hp-bar"><span class="hp-fill player-fill" style="width:${hpPct(battle.player.displayHp, battle.player.maxHp)}%"></span></div>
              </div>
            </div>
            <div class="battle-body player-body">
              <div class="cards-area">
                <div class="total">Player total <strong>${displayTotal(battle.player.cards)}</strong></div>
                ${!summary && battle.player.passed ? `<div class="pass-indicator">Pass</div>` : ""}
                <div class="cards-stack ${summary ? "summary-active" : ""}">${renderCards(battle.player.cards, "player", summary?.winnerClass === "player", playerHighlights)}</div>
              </div>
              ${summary ? renderSideSummary(summary.player, "player") : `
                <div class="controls-area">
                  <button class="ghost-btn ${playerHasBlackjack ? "jackpot" : ""}" data-action="pass-turn" ${battle.locked || introDialog ? "disabled" : ""}>Pass</button>
                  <button class="secondary-btn" data-action="draw-card" ${battle.locked || introDialog ? "disabled" : ""}>Draw</button>
                </div>
              `}
            </div>
          </div>
          ${introDialog ? `
            <div class="battle-dialog-layer" data-battle-dialog>
              <div class="battle-speech">
                ${introDialog.text}
              </div>
            </div>
          ` : ""}
        </section>
      `;
    }

    function renderCards(cards, owner, isWinner, highlights = []) {
      const battle = state.battle;
      if (battle && !battle.renderedDeals) {
        battle.renderedDeals = {};
      }
      return cards.map((card, index) => {
        const suit = SUITS[card.suit];
        const key = cardKey(card.rank, card.suit);
        const memory = owner === "player" ? getCardMemory(key) : null;
        const peek = index > 0 ? `${card.rank}${suit.icon}` : "";
        const isNew = Boolean(!state.roundSummary && battle && card.dealtAt && !battle.renderedDeals[card.dealtAt]);
        if (isNew) {
          battle.renderedDeals[card.dealtAt] = true;
        }
        const isHighlighted = highlights.includes(index);
        return `
          <div class="mini-card ${isNew ? `from-${owner}` : ""} ${isWinner ? "round-win" : ""} ${isHighlighted ? "summary-hit" : ""}" style="--i:${index};">
            ${renderCollectionCard(card.rank, card.suit, {
              hideFooter: true,
              memoryOverride: memory,
              includeMemoryDamage: owner === "player",
              showUpgrade: false
            })}
            ${peek ? `<div class="peek">${peek}</div>` : ""}
          </div>
        `;
      }).join("");
    }

    function renderSideSummary(sideSummary, sideName) {
      const lines = sideSummary.lines.map(line => {
        const active = line.key === sideSummary.currentStep;
        const shown = sideSummary.visibleKeys.includes(line.key);
        const isUpgrade = ["runSuit", "runRank", "runCombo", "stageFlow", "runBlackjack"].includes(line.key);
        return shown ? `<div class="damage-line ${active ? "active" : ""}"><span class="label">${isUpgrade ? renderUpgradeStars(line.upgradeCount || 1) : ""}${line.label}</span><span class="value">+${line.amount}</span></div>` : "";
      }).join("");
      const reduced = sideSummary.reducedTotalVisible && sideSummary.originalTotal !== sideSummary.reducedTotal;
      return `
        <div class="summary-panel ${sideName}">
          <div class="summary-head">
            <strong>${sideSummary.title}</strong>
            <span class="summary-pill ${sideSummary.winnerClass}">${sideSummary.winnerLabel}</span>
          </div>
          <div class="summary-lines">
            ${lines}
            <div class="damage-total ${reduced ? "strike" : ""}"><span>Total</span><span class="value">+${reduced ? sideSummary.originalTotal : sideSummary.totalShown}</span></div>
            ${reduced ? `<div class="damage-total final"><span>After loss</span><span class="value">+${sideSummary.reducedTotal}</span></div>` : ""}
          </div>
          ${sideName === "player" && sideSummary.readyForNext ? `<div class="summary-actions"><button class="primary-btn" data-action="next-round">${getAdvanceButtonLabel()}</button></div>` : ""}
        </div>
      `;
    }

    function renderReward() {
      if (state.reward?.type === "memory-unlock") {
        const revealed = Boolean(state.reward.revealedMemory);
        return `
          <div class="reward-overlay">
            <div class="reward-card">
              <h3>${state.reward.title}</h3>
              <div class="memory-reward-grid">
                <div class="reward-flip-card ${revealed ? "revealed" : ""}">
                  <button data-action="reveal-memory" aria-label="Reveal memory card">
                    <div class="reward-flip-inner">
                    <div class="reward-back memory-back">
                      <div class="reward-back-core">MEMORY</div>
                    </div>
                    <div class="reward-face">
                      ${renderMemoryPhotoCard({ art: state.reward.memoryArt }, { unlocked: true })}
                    </div>
                  </div>
                </button>
              </div>
              </div>
              <div class="memory-hint">${state.reward.message || "Możesz obejrzeć zdobyte wspomnienia w Collections"}</div>
              <div style="display:flex; justify-content:center; margin-top:10px; ${revealed ? "" : "visibility:hidden; pointer-events:none;"}">
                <button class="primary-btn" data-action="claim-reward">${state.reward.buttonLabel || "Continue"}</button>
              </div>
            </div>
          </div>
        `;
      }
      const cards = state.reward.cards || [];
      const revealedCards = state.reward.revealedCards || cards.map(() => false);
      const allRevealed = !cards.length || revealedCards.every(Boolean);
      return `
        <div class="reward-overlay">
          <div class="reward-card">
            <h3>${state.reward.title}</h3>
            ${state.reward.body ? `<p>${state.reward.body}</p>` : ""}
            ${cards.length ? `
              <div class="reward-pack-grid">
                ${cards.map((card, index) => {
                  const revealed = Boolean(revealedCards[index]);
                  const key = cardKey(card.rank, card.suit);
                  const level = state.deckLevels[key] || 1;
                  const copiesBefore = Number.isFinite(card.copiesBefore) ? card.copiesBefore : Math.max(0, (state.deckCopies[key] || 0) - (card.amount || 0));
                  const copiesAfter = Number.isFinite(card.copiesAfter) ? card.copiesAfter : (state.deckCopies[key] || 0);
                  const progressFromRatio = progressRatio(level, copiesBefore);
                  const progressToRatio = progressRatio(level, copiesAfter);
                  const progressAnimated = revealed && state.reward.progressAnimatedIndex === index;
                  return `
                    <div class="reward-pack-card ${revealed ? "revealed" : ""}">
                      <div class="reward-pack-qty">x${card.amount}</div>
                      <div class="reward-flip-card ${revealed ? "revealed" : ""}">
                        <button data-reward-index="${index}" aria-label="Reveal reward card">
                          <div class="reward-flip-inner">
                            <div class="reward-back">
                              <div class="reward-back-core">RUNNER</div>
                            </div>
                            <div class="reward-face">
                              ${renderCollectionCard(card.rank, card.suit, {
                                progressFromRatio,
                                progressToRatio,
                                progressAnimated
                              })}
                            </div>
                          </div>
                        </button>
                      </div>
                    </div>
                  `;
                }).join("")}
              </div>
            ` : ""}
            <div style="display:flex; justify-content:center; ${allRevealed ? "" : "visibility:hidden; pointer-events:none;"}">
              <button class="primary-btn" data-action="claim-reward">${state.reward.buttonLabel || "Continue"}</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderUpgradeChoice() {
      const options = state.upgradeChoice?.options || [];
      return `
        <div class="upgrade-choice">
          <h3>Wybierz rozwini\u0119cie</h3>
          <p>${state.upgradeChoice.title}</p>
          <div class="upgrade-grid">
            ${options.map((option, index) => `
              <button class="upgrade-option" data-upgrade-index="${index}">
                <div class="upgrade-art" style="background-color:${option.accent}14;">
                  <div class="upgrade-symbol" style="color:${option.accent};">${option.symbol}</div>
                </div>
                <div class="upgrade-copy">
                  <div class="upgrade-name">${option.title}</div>
                  <div class="upgrade-desc">${option.description}</div>
                </div>
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function bindEvents() {
      closeBattleEl.onclick = null;
      healBattleEl.onclick = null;
      skipBattleStageEl.onclick = null;
      if (state.screen === "battle") {
        closeBattleEl.onclick = () => {
          if (!state.battle?.locked) {
            failRun();
            render();
          }
        };
        healBattleEl.onclick = () => {
          healPlayerForTest();
        };
        skipBattleStageEl.onclick = () => {
          skipBattleStageForTest();
        };
      }
      app.querySelectorAll("[data-nav]").forEach(el => {
        el.addEventListener("click", () => {
          const nav = el.dataset.nav;
          if (!nav) {
            return;
          }
          state.screen = "home";
          state.subScreen = nav === "deck" ? "deck" : nav === "collections" ? "collections" : "main";
          render();
        });
      });

      app.querySelectorAll("[data-action]").forEach(el => {
        el.addEventListener("click", () => handleAction(el.dataset.action));
      });

      app.querySelectorAll("[data-suit]").forEach(el => {
        el.addEventListener("click", () => {
          state.deckSuit = el.dataset.suit;
          render();
        });
      });

      app.querySelectorAll("[data-upgrade-index]").forEach(el => {
        el.addEventListener("click", () => pickUpgrade(Number(el.dataset.upgradeIndex)));
      });

      app.querySelectorAll("[data-card-focus]").forEach(el => {
        el.addEventListener("click", () => {
          state.deckFocus = el.dataset.cardFocus;
          state.deckMemoryPickerOpen = false;
          render();
        });
      });

      app.querySelectorAll("[data-collection-open]").forEach(el => {
        el.addEventListener("click", () => {
          state.collectionFocus = el.dataset.collectionOpen;
          render();
        });
      });

      app.querySelectorAll("[data-memory-open]").forEach(el => {
        el.addEventListener("click", () => {
          const [characterId, indexText] = el.dataset.memoryOpen.split(":");
          const photos = getCollectionPhotos(characterId);
          const photo = photos[Number(indexText)];
          if (!photo) {
            return;
          }
          state.collectionImageFocus = {
            characterId,
            index: Number(indexText),
            art: photo.art
          };
          render();
        });
      });

      app.querySelectorAll("[data-memory-assign]").forEach(el => {
        el.addEventListener("click", () => {
          const [cardKeyValue, characterId, indexText] = el.dataset.memoryAssign.split(":");
          const photos = getCollectionPhotos(characterId);
          const photo = photos[Number(indexText)];
          if (!photo) {
            return;
          }
          state.cardMemories[cardKeyValue] = {
            characterId,
            index: Number(indexText),
            art: photo.art
          };
          state.deckMemoryPickerOpen = false;
          render();
        });
      });

      app.querySelectorAll("[data-reward-index]").forEach(el => {
        el.addEventListener("click", () => {
          revealRewardCard(Number(el.dataset.rewardIndex), el.closest(".reward-pack-card"));
        });
      });

      app.querySelectorAll("[data-run-go]").forEach(el => {
        el.addEventListener("click", () => {
          const picker = el.closest(".test-run-picker")?.querySelector("[data-run-picker]");
          switchTestRun(Number(picker?.value));
        });
      });

      const homeChatOverlay = document.getElementById("homeChatOverlay");
      if (homeChatOverlay) {
        homeChatOverlay.addEventListener("click", event => {
          const head = event.target.closest(".chat-head");
          if (head) {
            return;
          }
          advanceHomeChat();
        });
      }

      const battleDialogLayer = app.querySelector("[data-battle-dialog]");
      if (battleDialogLayer) {
        battleDialogLayer.addEventListener("click", advanceBattleDialog);
      }
    }

    function switchTestRun(runId) {
      const stage = STAGES.find(item => item.id === runId);
      if (!stage) {
        return;
      }
      unlockPreviousRunMemoriesForTest(runId);
      state.selectedStage = runId;
      state.unlockedStage = Math.max(state.unlockedStage || 1, runId);
      state.currentNode = 0;
      state.screen = "home";
      state.subScreen = "main";
      state.battle = null;
      state.reward = null;
      state.upgradeChoice = null;
      state.runBuffs = defaultRunBuffs();
      state.runUpgradeCounts = defaultRunUpgradeCounts();
      state.stageCardCount = 0;
      state.runRoundCount = 0;
      state.player.currentHp = playerMaxHp();
      state.homeChat = { runId, unlocked: false, open: false, step: -1, waitingForClose: false, messages: [] };
      saveState();
      render();
    }

    function unlockPreviousRunMemoriesForTest(runId) {
      for (const stage of STAGES) {
        if (stage.id >= runId) {
          continue;
        }
        for (const unlock of getRunMemoryUnlocks(stage.id)) {
          unlockCollectionMemoryReward(unlock);
        }
      }
    }

    function handleAction(action) {
      switch (action) {
        case "play-stage":
          if (!state.homeChat?.unlocked) {
            break;
          }
          if (!getCurrentStage().enemies.length) {
            state.screen = "map";
            state.subScreen = "main";
            break;
          }
          state.runRoundCount = 0;
          state.stageCardCount = 0;
          state.runBuffs = defaultRunBuffs();
          state.runUpgradeCounts = defaultRunUpgradeCounts();
          state.upgradeChoice = null;
          state.screen = "map";
          state.subScreen = "main";
          if (state.currentNode >= getCurrentStage().enemies.length) {
            state.currentNode = 0;
          }
          pushLog(`Startujesz RUN ${getCurrentStage().id}. Cel: Stage ${getCurrentStage().id}-${state.currentNode + 1}.`);
          break;
        case "open-boss-chat":
          openHomeChat();
          break;
        case "start-battle":
          startBattle();
          break;
        case "draw-card":
          playerDraw();
          break;
        case "pass-turn":
          playerPass();
          break;
        case "claim-reward":
          claimReward();
          break;
        case "reveal-memory":
          revealMemoryReward();
          break;
        case "next-round":
          advanceAfterRound();
          break;
        case "new-game":
          resetGame();
          break;
        case "close-deck-focus":
          state.deckFocus = null;
          state.deckMemoryPickerOpen = false;
          break;
        case "toggle-deck-memory-picker":
          state.deckMemoryPickerOpen = !state.deckMemoryPickerOpen;
          break;
        case "remove-card-photo":
          if (state.deckFocus && state.cardMemories?.[state.deckFocus]) {
            delete state.cardMemories[state.deckFocus];
          }
          state.deckMemoryPickerOpen = false;
          break;
        case "close-collection":
          state.collectionFocus = null;
          break;
        case "close-memory-view":
          state.collectionImageFocus = null;
          break;
        case "upgrade-card":
          upgradeFocusedCard();
          break;
        case "flip-reward-card":
          break;
        case "deck-suit":
          break;
        default:
          break;
      }
      render();
    }

    function getCurrentStage() {
      return STAGES.find(stage => stage.id === state.selectedStage) || STAGES[0];
    }

    function currentStageNodeCount() {
      return Math.max(1, getCurrentStage().enemies.length);
    }

    function getEnemyArt(stageId, nodeIndex) {
      const enemy = getCurrentStage().enemies[nodeIndex];
      if (!enemy) {
        return "runner_files/hearts_girl_01.png";
      }
      if (enemy.art) {
        return enemy.art;
      }
      if (enemy.suit === "hearts") {
        const portraits = [
          "runner_files/hearts_girl_01.png",
          "runner_files/hearts_girl_02.png",
          "runner_files/hearts_girl_03.png"
        ];
        return portraits[(stageId + nodeIndex) % portraits.length];
      }
      if (enemy.suit === "spades") {
        if (enemy.role === "boss") {
          return "runner_files/spades_boss_01.png";
        }
        const portraits = [
          "runner_files/spades_thug_01.png",
          "runner_files/spades_thug_02.png"
        ];
        return portraits[(stageId + nodeIndex) % portraits.length];
      }
      if (enemy.suit === "clubs") {
        const portraits = [
          "runner_files/clubs_policeman_01.png",
          "runner_files/clubs_police_02.png",
          "runner_files/clubs_security_01.png"
        ];
        return portraits[(stageId + nodeIndex) % portraits.length];
      }
      if (enemy.suit === "diamonds") {
        return "runner_files/Karo_mechanic_01.png";
      }
      return "runner_files/map_bg.png";
    }

    function getEnemyDisplayName(enemy, stageId, nodeIndex) {
      if (enemy.art) {
        return enemy.name;
      }
      if (enemy.suit === "hearts") {
        const names = ["Basia Neon", "Velvet Rox", "Nina Afterdark"];
        return names[(stageId + nodeIndex) % names.length];
      }
      if (enemy.suit === "diamonds") {
        const names = ["Mechanik V8", "Chrome Wrench", "Nitro Jack"];
        return names[(stageId + nodeIndex) % names.length];
      }
      if (enemy.suit === "spades") {
        if (enemy.role === "boss") {
          return "Grim King";
        }
        const names = ["Tyron the Thug", "Razor Vex", "King Ring"];
        return names[(stageId + nodeIndex) % names.length];
      }
      if (enemy.suit === "clubs") {
        const names = ["Corrupted Cop", "Officer Grave", "Night Patrol", "Steel Guard"];
        return names[(stageId + nodeIndex) % names.length];
      }
      return enemy.name;
    }

    function sampleUpgradeChoices() {
      const pool = [...RUN_UPGRADES];
      const picked = [];
      while (picked.length < 3 && pool.length) {
        const index = Math.floor(Math.random() * pool.length);
        picked.push(pool.splice(index, 1)[0]);
      }
      return picked;
    }

    function createUpgradeChoice(stageId, nodeIndex) {
      return {
        title: `Stage ${stageId}-${nodeIndex}`,
        options: sampleUpgradeChoices()
      };
    }

    function currentRunUpgradeList() {
      return RUN_UPGRADES.filter(upgrade => getRunUpgradeCount(upgrade.id) > 0);
    }

    function getRunUpgradeCount(upgradeId) {
      return Math.max(0, state.runUpgradeCounts?.[upgradeId] || 0);
    }

    function renderUpgradeStars(count) {
      const starCount = Math.max(1, Math.min(9, count || 1));
      return `<span class="upgrade-stars">${Array.from({ length: starCount }, () => "★").join("")}</span>`;
    }

    function renderRunUpgradeIcons() {
      const upgrades = currentRunUpgradeList();
      if (!upgrades.length) {
        return "";
      }
      return `
        <div class="run-upgrade-row">
          ${upgrades.map(upgrade => {
            const count = getRunUpgradeCount(upgrade.id);
            return `<span class="run-upgrade-chip" title="${upgrade.title}" style="color:${upgrade.accent};"><span>${upgrade.symbol}</span>${count > 1 ? `<span class="run-upgrade-count">x${count}</span>` : ""}</span>`;
          }).join("")}
        </div>
      `;
    }

    function pickUpgrade(index) {
      const choice = state.upgradeChoice;
      if (!choice) {
        return;
      }
      const picked = choice.options[index];
      if (!picked) {
        return;
      }
      applyRunUpgrade(picked);
      state.upgradeChoice = null;
      render();
    }

    function applyRunUpgrade(upgrade) {
      state.runUpgradeCounts[upgrade.id] = getRunUpgradeCount(upgrade.id) + 1;
      switch (upgrade.type) {
        case "suit":
          state.runBuffs.suit[upgrade.suit] += upgrade.value;
          break;
        case "rank":
          state.runBuffs.rank[upgrade.rank] += upgrade.value;
          break;
        case "pair":
          state.runBuffs.pair += upgrade.value;
          break;
        case "trips":
          state.runBuffs.trips += upgrade.value;
          break;
        case "blackjack":
          state.runBuffs.blackjack += upgrade.value;
          break;
        case "stageCards":
          state.runBuffs.stageCards += upgrade.value;
          break;
        case "stageHeal":
          state.runBuffs.stageHeal += upgrade.value;
          break;
        default:
          break;
      }
    }

    function startBattle() {
      const stage = getCurrentStage();
      const enemyBase = stage.enemies[state.currentNode];
      if (!enemyBase) {
        return;
      }
      state.stageCardCount = 0;
      const battle = {
        enemy: {
          ...enemyBase,
          name: getEnemyDisplayName(enemyBase, stage.id, state.currentNode),
          art: getEnemyArt(stage.id, state.currentNode),
          maxHp: enemyBase.hp,
          hp: enemyBase.hp,
          displayHp: enemyBase.hp,
          recentDamage: 0,
          cards: [],
          passed: false
        },
        player: {
          hp: state.player.currentHp,
          maxHp: playerMaxHp(),
          displayHp: state.player.currentHp,
          recentDamage: 0,
          cards: [],
          passed: false
        },
        deck: shuffle(createDeck()),
        locked: false,
        turn: 1,
        dealSequence: 0,
        renderedDeals: {},
        introDialogs: createBattleIntroDialogs(stage.id, state.currentNode),
        introDialogIndex: 0,
        introComplete: false
      };
      battle.locked = battle.introDialogs.length > 0;
      state.battle = battle;
      state.screen = "battle";
      state.logs = [`Stage ${stage.id}-${state.currentNode + 1}: ${enemyBase.name} wchodzi do gry.`];
      if (battle.introDialogs.length) {
        pushLog(`${battle.enemy.name} zaczyna rozmowe.`);
        return;
      }
      dealOpeningCards();
    }
