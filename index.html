    function createBattleIntroDialogs(stageId, nodeIndex) {
      const configuredDialogs = getConfiguredBattleIntroDialogs(stageId, nodeIndex);
      if (configuredDialogs) {
        return configuredDialogs;
      }
      if (stageId === 1 && nodeIndex === 0) {
        return [
          { speaker: "enemy", text: "Więc chcesz aby naprawiła ci tego gruchota w pół godziny?" },
          { speaker: "enemy", text: "Jestem najlepszym mechanikiem w mieście, ale to jest nierealne..." },
          { speaker: "enemy", text: "Masz robotę? Chyba będziesz musiał wziąć taksówkę, sorry bro..." }
        ];
      }
      if (stageId === 1 && nodeIndex === 1) {
        return [
          { speaker: "enemy", text: "...bulp..." },
          { speaker: "enemy", text: "...kierownik szuka taksi?" },
          { speaker: "enemy", text: "...to kierownik grzecznie zapłaci, a ja pokażę..." }
        ];
      }
      return [];
    }

    function getConfiguredBattleIntroDialogs(stageId, nodeIndex) {
      const run = window.RUNNER_STAGE_DATA?.runs?.find(item => Number(item.id) === Number(stageId));
      const stage = run?.stages?.[nodeIndex];
      if (!stage || !Array.isArray(stage.preFightDialogs)) {
        return null;
      }
      return stage.preFightDialogs
        .filter(dialog => dialog?.text?.trim())
        .map(dialog => ({ speaker: dialog.speakerId || "enemy", text: dialog.text }));
    }

    function getActiveBattleDialog() {
      const battle = state.battle;
      if (!battle?.introDialogs?.length || battle.introComplete) {
        return null;
      }
      return battle.introDialogs[battle.introDialogIndex] || null;
    }

    function advanceBattleDialog() {
      const battle = state.battle;
      if (!battle?.introDialogs?.length || battle.introComplete) {
        return;
      }
      battle.introDialogIndex += 1;
      if (battle.introDialogIndex < battle.introDialogs.length) {
        render();
        return;
      }
      battle.introComplete = true;
      battle.locked = false;
      dealOpeningCards();
      render();
    }

    function dealOpeningCards() {
      const battle = state.battle;
      if (!battle || battle.player.cards.length || battle.enemy.cards.length) {
        return;
      }
      drawForSide(battle.player);
      drawForSide(battle.enemy);
      pushLog("Obie strony dobierajÄ… pierwszÄ… kartÄ™. Blackjackowa rozgrywka startuje.");
    }

    function createDeck() {
      const deck = [];
      for (const suit of Object.keys(SUITS)) {
        for (const rank of RANKS) {
          deck.push({ rank, suit });
        }
      }
      return deck;
    }

    function shuffle(deck) {
      const copy = [...deck];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function drawForSide(side) {
      if (!state.battle.deck.length) {
        state.battle.deck = shuffle(createDeck());
      }
      state.battle.dealSequence += 1;
      const card = state.battle.deck.pop();
      side.cards.unshift({ ...card, dealtAt: state.battle.dealSequence });
    }

    function playerDraw() {
      const battle = state.battle;
      if (!battle || battle.locked) {
        return;
      }
      battle.locked = true;
      drawForSide(battle.player);
      pushLog(`Dobierasz kartÄ™. TwĂłj wynik to ${displayTotal(battle.player.cards)}.`);
      render();
      setTimeout(() => {
        resolveSingleEnemyTurn(() => {
          const resolved = evaluateRound();
          if (!resolved && state.battle) {
            state.battle.locked = false;
            render();
          }
        });
      }, 320);
    }

    function playerPass() {
      const battle = state.battle;
      if (!battle || battle.locked) {
        return;
      }
      battle.locked = true;
      battle.player.passed = true;
      pushLog("Pass. Trzymasz wynik i czekasz na ruch przeciwnika.");
      render();
      resolveEnemyAutoTurn(() => {
        const resolved = evaluateRound();
        if (!resolved && state.battle) {
          state.battle.locked = false;
          render();
        }
      });
    }

    function resolveSingleEnemyTurn(onDone) {
      const battle = state.battle;
      if (!battle) {
        return;
      }
      if (battle.enemy.passed || handTotal(battle.enemy.cards) > 21) {
        if (onDone) {
          onDone();
        }
        return;
      }
      enemyTurn();
      render();
      if (onDone) {
        setTimeout(onDone, 520);
      }
    }

    function resolveEnemyAutoTurn(onDone) {
      const battle = state.battle;
      if (!battle) {
        return;
      }
      if (battle.enemy.passed || handTotal(battle.enemy.cards) > 21) {
        if (onDone) {
          onDone();
        }
        return;
      }
      const didDraw = enemyTurn();
      render();
      if (!didDraw) {
        if (onDone) {
          setTimeout(onDone, 220);
        }
        return;
      }
      setTimeout(() => {
        if (!state.battle) {
          return;
        }
        if (state.battle.enemy.passed || handTotal(state.battle.enemy.cards) > 21) {
          if (onDone) {
            onDone();
          }
          return;
        }
        resolveEnemyAutoTurn(onDone);
      }, 560);
    }

    function enemyTurn() {
      const battle = state.battle;
      if (battle.enemy.passed) {
        return false;
      }
      const total = handTotal(battle.enemy.cards);
      const playerTotal = handTotal(battle.player.cards);
      const playerBust = playerTotal > 21;
      const enemyIsWinning = battle.player.passed && !playerBust && total <= 21 && total > playerTotal;
      const enemyCanTie = battle.player.passed && !playerBust && total === playerTotal;
      const shouldDraw = !playerBust && !enemyIsWinning && !enemyCanTie && (total < 16 || (total < 18 && Math.random() > 0.65));
      if (shouldDraw) {
        drawForSide(battle.enemy);
        pushLog(`${battle.enemy.name} dobiera kartÄ™. Wynik przeciwnika: ${displayTotal(battle.enemy.cards)}.`);
        return true;
      } else {
        battle.enemy.passed = true;
        pushLog(`${battle.enemy.name} pasuje przy ${displayTotal(battle.enemy.cards)}.`);
        return false;
      }
    }

    function evaluateRound() {
      const battle = state.battle;
      const playerTotal = handTotal(battle.player.cards);
      const enemyTotal = handTotal(battle.enemy.cards);
      const playerBust = playerTotal > 21;
      const enemyBust = enemyTotal > 21;
      const bothPassed = battle.player.passed && battle.enemy.passed;

      if (!(playerBust || enemyBust || bothPassed)) {
        return false;
      }

      battle.locked = true;
      state.runRoundCount += 1;
      state.stageCardCount += battle.player.cards.length;
      setTimeout(() => {
        if (playerBust && enemyBust) {
          state.roundSummary = buildDoubleBustSummary();
          state.pendingRoundResult = { type: "draw-reset" };
          render();
          return;
        }

        const outcome = determineRoundWinner(playerTotal, enemyTotal, playerBust, enemyBust);
        const playerDamage = playerBust ? buildBustDamage() : calculateDamageBreakdown(battle.player.cards, battle.enemy.suit, { isPlayer: true, stageCardsUsed: state.stageCardCount });
        const enemyDamage = enemyBust ? buildBustDamage() : calculateDamageBreakdown(battle.enemy.cards, battle.enemy.suit, { isPlayer: false, stageCardsUsed: 0 });
        applyWinnerBonus(playerDamage, enemyDamage, outcome.winnerClass);
        applyLoserPenalty(playerDamage, enemyDamage, outcome.winnerClass);
        const enemyAfter = Math.max(0, battle.enemy.hp - playerDamage.total);
        const playerAfter = Math.max(0, battle.player.hp - enemyDamage.total);

        state.roundSummary = buildRoundSummary(playerDamage, enemyDamage, outcome.winnerClass);
        render();
        state.pendingRoundResult = {
          type: enemyAfter <= 0 || playerAfter <= 0 ? "finish-battle" : "reset-round",
          enemyAfter,
          playerAfter,
          enemyDamage: playerDamage.total,
          playerDamage: enemyDamage.total
        };
        runRoundSummarySequence(enemyAfter, playerAfter);
      }, 400);
      return true;
    }

    function resetRound() {
      const battle = state.battle;
      battle.player.cards = [];
      battle.enemy.cards = [];
      battle.player.passed = false;
      battle.enemy.passed = false;
      battle.player.recentDamage = 0;
      battle.enemy.recentDamage = 0;
      state.roundReveal = null;
      state.roundSummary = null;
      battle.locked = false;
      battle.turn += 1;
      battle.renderedDeals = {};
      drawForSide(battle.player);
      drawForSide(battle.enemy);
    }

    function finishBattle() {
      const battle = state.battle;
      const stage = getCurrentStage();
      if (battle.player.hp <= 0 && battle.enemy.hp <= 0) {
        failRun();
        return;
      }

      if (battle.player.hp <= 0) {
        failRun();
        return;
      }

      state.currentNode += 1;
      if (state.currentNode >= stage.enemies.length) {
        const firstClear = !state.completedStages.includes(stage.id);
        state.completedStages.push(stage.id);
        const packCards = createBattlePack(battle.enemy.suit);
        grantBattlePack(packCards);
        awardStage(stage, packCards, { firstClear });
      } else {
        const healPct = state.runBuffs.stageHeal || 0.10;
        const healedHp = Math.min(playerMaxHp(), battle.player.hp + Math.round(playerMaxHp() * healPct));
        state.player.currentHp = healedHp;
        state.screen = "map";
        state.battle = null;
        state.upgradeChoice = createUpgradeChoice(stage.id, state.currentNode);
      }
    }

    function healPlayerForTest() {
      const battle = state.battle;
      if (!battle) {
        return;
      }
      const maxHp = playerMaxHp();
      battle.player.hp = maxHp;
      battle.player.displayHp = maxHp;
      battle.player.recentDamage = 0;
      state.player.currentHp = maxHp;
      saveState();
      render();
    }

    function skipBattleStageForTest() {
      const battle = state.battle;
      if (!battle) {
        return;
      }
      const stage = getCurrentStage();
      const skippedSuit = battle.enemy.suit;
      state.currentNode += 1;
      state.roundReveal = null;
      state.roundSummary = null;
      state.pendingRoundResult = null;
      state.player.currentHp = battle.player.hp;
      if (state.currentNode >= stage.enemies.length) {
        const firstClear = !state.completedStages.includes(stage.id);
        if (firstClear) {
          state.completedStages.push(stage.id);
        }
        const packCards = createBattlePack(skippedSuit);
        grantBattlePack(packCards);
        awardStage(stage, packCards, { firstClear });
        render();
        return;
      }
      state.screen = "map";
      state.subScreen = "main";
      state.battle = null;
      state.upgradeChoice = createUpgradeChoice(stage.id, state.currentNode);
      saveState();
      render();
    }

    function awardStage(stage, packCards = [], options = {}) {
      state.player.soft += stage.rewardSoft;
      gainXp(stage.rewardXp);
      const nextStage = Math.min(STAGES.length, stage.id + 1);
      const memoryUnlock = getPendingMemoryUnlock(stage.id);
      state.unlockedStage = Math.max(state.unlockedStage, nextStage);
      state.selectedStage = nextStage;
      state.currentNode = 0;
      state.battle = null;
      state.screen = "home";
      state.subScreen = "main";
      state.homeChat = { runId: nextStage, unlocked: false, open: false, step: -1, waitingForClose: false, messages: [] };
      state.upgradeChoice = null;
      state.runBuffs = defaultRunBuffs();
      state.runUpgradeCounts = defaultRunUpgradeCounts();
      state.stageCardCount = 0;
      state.reward = {
        type: "stage-clear",
        title: `Run ${stage.id} cleared`,
        body: `Boss pokonany. Odbierasz $${stage.rewardSoft} i ${stage.rewardXp} XP. ${nextStage > stage.id ? `Odblokowano RUN ${nextStage}.` : "Wszystkie dostÄ™pne runy ukoĹ„czone."}`,
        cards: packCards,
        revealedCards: packCards.map(() => false),
        buttonLabel: "Continue",
        afterClaim: memoryUnlock ? { type: "memory-unlock", unlock: memoryUnlock } : { type: "home" }
      };
      state.runRoundCount = 0;
    }

    function gainXp(amount) {
      state.player.xp += amount;
      while (state.player.xp >= state.player.xpToNext) {
        state.player.xp -= state.player.xpToNext;
        state.player.level += 1;
        state.player.xpToNext += 40;
        state.player.currentHp = playerMaxHp();
      }
    }

    function claimReward() {
      const reward = state.reward;
      state.reward = null;
      state.deckFocus = null;
      if (reward?.afterClaim?.type === "memory-unlock") {
        const unlock = reward.afterClaim.unlock;
        unlockCollectionMemoryReward(unlock);
        const photo = getCollectionPhotos(unlock.characterId).find(item => item.art === unlock.photoArt) || { art: unlock.photoArt };
        state.reward = {
          type: "memory-unlock",
          title: "You gained a new memory",
          memoryArt: photo?.art || "runner_files/memories/nitro_01.png",
          message: unlock.text || "Możesz obejrzeć zdobyte wspomnienia w Collections",
          revealedMemory: false,
          buttonLabel: "Continue",
          afterClaim: { type: "home" }
        };
        return;
      }
      if (reward?.afterClaim?.type === "upgrade") {
        state.screen = "map";
        state.subScreen = "main";
        state.upgradeChoice = reward.afterClaim.choice;
        return;
      }
      state.screen = "home";
      state.subScreen = "main";
    }

    function revealRewardCard(index, cardEl = null) {
      if (!state.reward?.cards?.length) {
        return;
      }
      if (!Array.isArray(state.reward.revealedCards)) {
        state.reward.revealedCards = state.reward.cards.map(() => false);
      }
      if (state.reward.revealedCards[index]) {
        return;
      }
      state.reward.revealedCards[index] = true;
      state.reward.progressAnimatedIndex = index;
      if (!cardEl) {
        render();
        return;
      }
      cardEl.classList.add("revealed");
      cardEl.querySelector(".reward-flip-card")?.classList.add("revealed");
      setTimeout(() => {
        if (state.reward) {
          render();
        }
      }, 760);
    }

    function revealMemoryReward() {
      if (!state.reward || state.reward.type !== "memory-unlock" || state.reward.revealedMemory) {
        return;
      }
      state.reward.revealedMemory = true;
      render();
    }

    function unlockCollectionMemoryReward(unlock) {
      if (!unlock?.characterId || !unlock?.photoArt) {
        return;
      }
      const rewardKey = getMemoryRewardKey(unlock);
      if (state.memoryRewardsClaimed?.[rewardKey]) {
        return;
      }
      if (!state.collections[unlock.characterId]) {
        state.collections[unlock.characterId] = { stars: 0, photosUnlocked: 0 };
      }
      const photos = getCollectionPhotos(unlock.characterId);
      const photoIndex = Math.max(0, photos.findIndex(photo => photo.art === unlock.photoArt));
      const collection = state.collections[unlock.characterId];
      collection.stars = Math.min(5, Math.max(collection.stars || 0, photoIndex + 1));
      collection.photosUnlocked = Math.max(collection.photosUnlocked || 0, photoIndex + 1);
      state.memoryRewardsClaimed[rewardKey] = true;
      saveState();
    }

    function advanceAfterRound() {
      if (!state.pendingRoundResult) {
        return;
      }
      const pending = state.pendingRoundResult;
      state.roundSummary = null;
      state.roundReveal = null;
      state.pendingRoundResult = null;
      if (pending.type === "draw-reset" || pending.type === "reset-round") {
        resetRound();
        return;
      }
      if (pending.type === "finish-battle") {
        finishBattle();
      }
    }

    function failRun() {
      const stage = getCurrentStage();
      const roundXp = state.runRoundCount;
      if (roundXp > 0) {
        gainXp(roundXp);
      }
      state.screen = "home";
      state.subScreen = "main";
      state.currentNode = 0;
      state.battle = null;
      state.player.currentHp = playerMaxHp();
      state.upgradeChoice = null;
      state.runBuffs = defaultRunBuffs();
      state.runUpgradeCounts = defaultRunUpgradeCounts();
      state.stageCardCount = 0;
      state.reward = {
        type: "fail",
        title: "Stage Failed",
        body: ""
      };
      state.runRoundCount = 0;
    }

    function resetGame() {
      localStorage.removeItem(STORAGE_KEY);
      const fresh = loadState();
      Object.keys(state).forEach(key => delete state[key]);
      Object.assign(state, fresh);
      normalizeState();
    }

    function openHomeChat() {
      if (state.homeChat.runId !== state.selectedStage) {
        state.homeChat = { runId: state.selectedStage, unlocked: false, open: true, step: -1, waitingForClose: false, messages: [] };
      } else {
      state.homeChat.open = true;
      }
      if (state.homeChat.messages.length === 0) {
        state.homeChat.step = -1;
        state.homeChat.waitingForClose = false;
        advanceHomeChat();
        return;
      }
      render();
    }

    function advanceHomeChat() {
      if (!state.homeChat.open) {
        return;
      }
      if (state.homeChat.waitingForClose) {
        state.homeChat.open = false;
        render();
        return;
      }
      state.homeChat.step += 1;
      const next = getHomeChatSteps()[state.homeChat.step];
      if (!next) {
        state.homeChat.unlocked = true;
        state.homeChat.waitingForClose = true;
        render();
        return;
      }
      state.homeChat.messages.push(next);
      render();
    }

    function handTotal(cards) {
      let total = 0;
      let aces = 0;
      for (const card of cards) {
        if (card.rank === "A") {
          total += 11;
          aces += 1;
        } else if (["K", "Q", "J"].includes(card.rank)) {
          total += 10;
        } else {
          total += Number(card.rank);
        }
      }
      while (total > 21 && aces > 0) {
        total -= 10;
        aces -= 1;
      }
      return total;
    }

    function displayTotal(cards) {
      const total = handTotal(cards);
      return total > 21 ? `${total} BUST` : total;
    }

    function calculateDamageBreakdown(cards, enemySuit, options = {}) {
      const counts = {};
      for (const card of cards) {
        counts[card.rank] = (counts[card.rank] || 0) + 1;
      }

      let base = 0;
      let suitBonus = 0;
      let comboBonus = 0;
      let runComboBonus = 0;
      let runSuitBonus = 0;
      let runRankBonus = 0;
      let memoryPhotoBonus = 0;
      let stageFlowBonus = 0;
      let pairUpgradeApplied = false;
      let tripsUpgradeApplied = false;
      const allIndexes = cards.map((_, index) => index);
      const suitIndexes = [];
      const comboIndexes = [];
      const memoryPhotoIndexes = [];
      const runBuffs = options.isPlayer ? state.runBuffs : defaultRunBuffs();
      const runSuitLines = {};
      const runRankLines = {};
      const memoryPhotoLines = {};
      for (const [index, card] of cards.entries()) {
        const level = options.isPlayer ? (state.deckLevels[cardKey(card.rank, card.suit)] || 1) : 1;
        const basePerPoint = cardBasePerPoint(level);
        const rawBaseDamage = cardValue(card, cards) * basePerPoint;
        base += rawBaseDamage;
        const memory = options.isPlayer ? getCardMemory(cardKey(card.rank, card.suit)) : null;
        if (memory) {
          memoryPhotoBonus += MEMORY_PHOTO_DAMAGE_BONUS;
          memoryPhotoIndexes.push(index);
          const characterId = memory.characterId || "memory";
          const character = getCharacterConfig(characterId);
          const label = `${character?.name || "Photo"} Memories`;
          if (!memoryPhotoLines[characterId]) {
            memoryPhotoLines[characterId] = { label, amount: 0, indices: [] };
          }
          memoryPhotoLines[characterId].amount += MEMORY_PHOTO_DAMAGE_BONUS;
          memoryPhotoLines[characterId].indices.push(index);
        }
        if (runBuffs.suit[card.suit]) {
          const extra = Math.round(rawBaseDamage * runBuffs.suit[card.suit]);
          runSuitBonus += extra;
          if (!runSuitLines[card.suit]) {
            const upgrade = findUpgradeDefinition(item => item.type === "suit" && item.suit === card.suit);
            runSuitLines[card.suit] = { amount: 0, indices: [], upgradeId: upgrade?.id, upgradeCount: getRunUpgradeCount(upgrade?.id) };
          }
          runSuitLines[card.suit].amount += extra;
          runSuitLines[card.suit].indices.push(index);
        }
        if (runBuffs.rank[card.rank]) {
          const extra = Math.round(rawBaseDamage * runBuffs.rank[card.rank]);
          runRankBonus += extra;
          if (!runRankLines[card.rank]) {
            const upgrade = findUpgradeDefinition(item => item.type === "rank" && item.rank === card.rank);
            runRankLines[card.rank] = { amount: 0, indices: [], upgradeId: upgrade?.id, upgradeCount: getRunUpgradeCount(upgrade?.id) };
          }
          runRankLines[card.rank].amount += extra;
          runRankLines[card.rank].indices.push(index);
        }
        const comboBaseDamage = Math.round(rawBaseDamage);
        if (card.suit === enemySuit) {
          suitIndexes.push(index);
          suitBonus += comboBaseDamage;
        }
        const count = counts[card.rank];
        if (count >= 2) {
          comboIndexes.push(index);
          const baseComboExtra = Math.round(comboBaseDamage * (count - 1));
          let comboExtra = baseComboExtra;
          if (count === 2 && runBuffs.pair > 0) {
            const upgradeExtra = Math.round(baseComboExtra * runBuffs.pair);
            comboExtra += upgradeExtra;
            runComboBonus += upgradeExtra;
            pairUpgradeApplied = true;
          }
          if (count >= 3 && runBuffs.trips > 0) {
            const upgradeExtra = Math.round(baseComboExtra * runBuffs.trips);
            comboExtra += upgradeExtra;
            runComboBonus += upgradeExtra;
            tripsUpgradeApplied = true;
          }
          comboBonus += comboExtra;
        }
      }

      if (options.isPlayer && runBuffs.stageCards > 0 && cards.length > 0) {
        stageFlowBonus = cards.reduce((sum, card) => {
          const level = options.isPlayer ? (state.deckLevels[cardKey(card.rank, card.suit)] || 1) : 1;
          const rawBaseDamage = cardValue(card, cards) * cardBasePerPoint(level);
          return sum + Math.round(rawBaseDamage * runBuffs.stageCards);
        }, 0);
      }
      const comboUpgradeParts = [];
      let runComboUpgradeCount = 0;
      if (pairUpgradeApplied) {
        const upgrade = findUpgradeDefinition(item => item.type === "pair");
        comboUpgradeParts.push(upgrade?.title || "Upgrade pair");
        runComboUpgradeCount += getRunUpgradeCount(upgrade?.id);
      }
      if (tripsUpgradeApplied) {
        const upgrade = findUpgradeDefinition(item => item.type === "trips");
        comboUpgradeParts.push(upgrade?.title || "Upgrade trips");
        runComboUpgradeCount += getRunUpgradeCount(upgrade?.id);
      }
      const comboUpgradeLabel = comboUpgradeParts.join(" / ") || "Upgrade combo";
      const stageFlowUpgrade = findUpgradeDefinition(item => item.type === "stageCards");
      const blackjackUpgrade = findUpgradeDefinition(item => item.type === "blackjack");
      const stageFlowLabel = stageFlowUpgrade?.title || "Upgrade stage";
      const blackjackUpgradeLabel = blackjackUpgrade?.title || "Upgrade blackjack";

      let total = base + memoryPhotoBonus + runSuitBonus + runRankBonus + suitBonus + comboBonus + runComboBonus + stageFlowBonus;
      let blackjackBonus = 0;
      let runBlackjackBonus = 0;
      if (handTotal(cards) === 21) {
        blackjackBonus = Math.round(total);
        if (runBuffs.blackjack > 0) {
          runBlackjackBonus = Math.round(blackjackBonus * runBuffs.blackjack);
        }
        total += blackjackBonus + runBlackjackBonus;
      }
      return {
        total,
        lines: [
          { key: "base", label: "Base", amount: base, indices: allIndexes },
          ...Object.values(memoryPhotoLines).map(data => ({
            key: "memoryPhoto",
            label: data.label,
            amount: data.amount,
            indices: uniqueIndexes(data.indices)
          })),
          ...Object.entries(runSuitLines).map(([suit, data]) => ({
            key: "runSuit",
            label: findUpgradeDefinition(item => item.type === "suit" && item.suit === suit)?.title || SUITS[suit].name,
            amount: data.amount,
            indices: uniqueIndexes(data.indices),
            upgradeCount: data.upgradeCount
          })),
          ...Object.entries(runRankLines).map(([rank, data]) => ({
            key: "runRank",
            label: findUpgradeDefinition(item => item.type === "rank" && item.rank === rank)?.title || rank,
            amount: data.amount,
            indices: uniqueIndexes(data.indices),
            upgradeCount: data.upgradeCount
          })),
          { key: "suit", label: `Suit ${SUITS[enemySuit].icon}`, amount: suitBonus, indices: uniqueIndexes(suitIndexes) },
          { key: "combo", label: "Pairs / Trips", amount: comboBonus - runComboBonus, indices: uniqueIndexes(comboIndexes) },
          { key: "runCombo", label: comboUpgradeLabel, amount: runComboBonus, indices: uniqueIndexes(comboIndexes), upgradeCount: runComboUpgradeCount },
          { key: "stageFlow", label: stageFlowLabel, amount: stageFlowBonus, indices: allIndexes, upgradeCount: getRunUpgradeCount(stageFlowUpgrade?.id) },
          { key: "blackjack", label: "Blackjack", amount: blackjackBonus, indices: handTotal(cards) === 21 ? allIndexes : [] },
          { key: "runBlackjack", label: blackjackUpgradeLabel, amount: runBlackjackBonus, indices: handTotal(cards) === 21 ? allIndexes : [], upgradeCount: getRunUpgradeCount(blackjackUpgrade?.id) }
        ].filter(line => line.amount > 0)
      };
    }

    function buildBustDamage() {
      return {
        total: 0,
        originalTotal: 0,
        lines: [{ key: "bust", label: "BUST", amount: 0, indices: [] }]
      };
    }

    function buildRoundSummary(playerDamage, enemyDamage, winnerClass) {
      const winnerLabel = winnerClass === "draw" ? "Remis rundy" : winnerClass === "player" ? "Player wins" : "Enemy wins";
      const steps = buildSummarySteps(playerDamage.lines, enemyDamage.lines, winnerClass);
      return {
        winnerClass,
        steps,
        currentStepIndex: 0,
        appliedDamage: false,
        player: buildSideSummaryState("Player dmg", playerDamage, winnerClass === "player" ? winnerLabel : winnerClass === "draw" ? "Remis" : "Liczenie", winnerClass),
        enemy: buildSideSummaryState("Enemy dmg", enemyDamage, winnerClass === "enemy" ? winnerLabel : winnerClass === "draw" ? "Remis" : "Liczenie", winnerClass)
      };
    }

    function determineRoundWinner(playerTotal, enemyTotal, playerBust, enemyBust) {
      if (playerBust && enemyBust) {
        return { winnerClass: "draw" };
      }
      if (playerBust) {
        return { winnerClass: "enemy" };
      }
      if (enemyBust) {
        return { winnerClass: "player" };
      }
      if (playerTotal === enemyTotal) {
        return { winnerClass: "draw" };
      }
      return { winnerClass: playerTotal > enemyTotal ? "player" : "enemy" };
    }

    function applyWinnerBonus(playerDamage, enemyDamage, winnerClass) {
      if (winnerClass === "player") {
        const baseLine = playerDamage.lines.find(line => line.label === "Base");
        const bonus = Math.round((baseLine?.amount || 0) * 0.5);
        playerDamage.lines.push({ key: "roundWin", label: "Round win", amount: bonus, indices: [], target: "name" });
        playerDamage.total += bonus;
      }
      if (winnerClass === "enemy") {
        const baseLine = enemyDamage.lines.find(line => line.label === "Base");
        const bonus = Math.round((baseLine?.amount || 0) * 0.5);
        enemyDamage.lines.push({ key: "roundWin", label: "Round win", amount: bonus, indices: [], target: "name" });
        enemyDamage.total += bonus;
      }
    }

    function applyLoserPenalty(playerDamage, enemyDamage, winnerClass) {
      playerDamage.originalTotal = playerDamage.total;
      enemyDamage.originalTotal = enemyDamage.total;
      if (winnerClass === "player") {
        enemyDamage.total = Math.round(enemyDamage.total * 0.5);
      }
      if (winnerClass === "enemy") {
        playerDamage.total = Math.round(playerDamage.total * 0.5);
      }
    }

    function cardValue(card, cards) {
      if (card.rank === "A") {
        const totalHigh = cards.reduce((sum, current) => {
          if (current.rank === "A") {
            return sum + 11;
          }
          if (["K", "Q", "J"].includes(current.rank)) {
            return sum + 10;
          }
          return sum + Number(current.rank);
        }, 0);
        return totalHigh > 21 ? 1 : 11;
      }
      if (["K", "Q", "J"].includes(card.rank)) {
        return 10;
      }
      return Number(card.rank);
    }

    function cardPreviewValue(rank) {
      if (rank === "A") {
        return 11;
      }
      if (["K", "Q", "J"].includes(rank)) {
        return 10;
      }
      return Number(rank);
    }

    function cardPreviewDamage(rank, suit, options = {}) {
      const key = cardKey(rank, suit);
      const level = state.deckLevels[key] || 1;
      const includeMemory = options.includeMemory !== false;
      const memoryBonus = includeMemory && getCardMemory(key) ? MEMORY_PHOTO_DAMAGE_BONUS : 0;
      return cardPreviewValue(rank) * cardBasePerPoint(level) + memoryBonus;
    }

    function hpPct(value, max) {
      return Math.max(0, Math.min(100, (value / max) * 100));
    }

    function getAdvanceButtonLabel() {
      const pending = state.pendingRoundResult;
      if (!pending) {
        return "Next Round";
      }
      if (pending.type === "finish-battle") {
        if (pending.playerAfter <= 0) {
          return "Stage Failed";
        }
        if (pending.enemyAfter <= 0) {
          return "Next Stage";
        }
      }
      return "Next Round";
    }

    function playerMaxHp() {
      return PLAYER_BASE_HP + (state.player.level - 1) * PLAYER_HP_PER_LEVEL;
    }

    function cardLevelData(level) {
      return CARD_LEVELS[level] || CARD_LEVELS[1];
    }

    function cardBasePerPoint(level) {
      return cardLevelData(level).dmgPerPoint;
    }

    function copiesNeededForNextLevel(level) {
      return cardLevelData(level).copiesNeeded;
    }

    function upgradeCostForLevel(level) {
      return cardLevelData(level).upgradeCost;
    }

    function progressRatio(level, copies) {
      const needed = copiesNeededForNextLevel(level);
      if (!needed) {
        return 100;
      }
      return Math.min(100, Math.round((copies / needed) * 100));
    }

    function cardKey(rank, suit) {
      return `${rank}_${suit}`;
    }

    function getMapLayout(runId) {
      return MAP_LAYOUTS[runId] || MAP_LAYOUTS[1];
    }

    function rankLabel(rank) {
      return ["A", "K", "Q", "J"].includes(rank) ? rank : `${rank}`;
    }

    function canUpgradeCard(key) {
      const level = state.deckLevels[key] || 1;
      const needed = copiesNeededForNextLevel(level);
      if (!needed) {
        return false;
      }
      return (state.deckCopies[key] || 0) >= needed;
    }

    function hasUpgradeableCardsInSuit(suitKey) {
      return RANKS.some(rank => canUpgradeCard(cardKey(rank, suitKey)));
    }

    function hasUpgradeableCards() {
      return Object.keys(SUITS).some(suitKey => hasUpgradeableCardsInSuit(suitKey));
    }

    function canAffordCardUpgrade(key) {
      const level = state.deckLevels[key] || 1;
      const cost = upgradeCostForLevel(level);
      if (!cost) {
        return false;
      }
      return state.player.soft >= cost;
    }

    function upgradeFocusedCard() {
      const key = state.deckFocus;
      if (!key || !canUpgradeCard(key) || !canAffordCardUpgrade(key)) {
        return;
      }
      const level = state.deckLevels[key] || 1;
      const cost = upgradeCostForLevel(level);
      const needed = copiesNeededForNextLevel(level);
      state.player.soft -= cost;
      state.deckCopies[key] -= needed;
      state.deckLevels[key] = Math.min(3, level + 1);
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function createBattlePack(enemySuit) {
      const allCards = [];
      for (const suit of Object.keys(SUITS)) {
        for (const rank of RANKS) {
          allCards.push({ rank, suit });
        }
      }
      const suitPool = allCards.filter(card => card.suit === enemySuit);
      const firstBase = suitPool[randomInt(0, suitPool.length - 1)];
      const first = { ...firstBase, amount: randomInt(2, 4) };
      const remaining = allCards.filter(card => cardKey(card.rank, card.suit) !== cardKey(first.rank, first.suit));
      const secondBase = remaining[randomInt(0, remaining.length - 1)];
      const second = { ...secondBase, amount: randomInt(2, 4) };
      return [first, second];
    }

    function grantBattlePack(cards) {
      for (const card of cards) {
        const key = cardKey(card.rank, card.suit);
        const copiesBefore = state.deckCopies[key] || 0;
        const copiesAfter = copiesBefore + card.amount;
        card.copiesBefore = copiesBefore;
        card.copiesAfter = copiesAfter;
        state.deckCopies[key] = copiesAfter;
      }
    }

    function findUpgradeDefinition(predicate) {
      return RUN_UPGRADES.find(predicate);
    }

    function pushLog(message) {
      state.logs = [message, ...state.logs].slice(0, 6);
    }

    function isRedSuit(suit) {
      return suit === "hearts" || suit === "diamonds";
    }

    function buildDoubleBustSummary() {
      return {
        winnerClass: "draw",
        steps: [],
        currentStepIndex: 0,
        appliedDamage: true,
        player: {
          title: "Player dmg",
          winnerClass: "draw",
          winnerLabel: "Double bust",
          lines: [{ key: "bust", label: "BUST", amount: 0, indices: [] }],
          visibleKeys: ["bust"],
          currentStep: "bust",
          totalShown: 0,
          readyForNext: true,
          originalTotal: 0,
          reducedTotal: 0,
          reducedTotalVisible: false
        },
        enemy: {
          title: "Enemy dmg",
          winnerClass: "draw",
          winnerLabel: "Double bust",
          lines: [{ key: "bust", label: "BUST", amount: 0, indices: [] }],
          visibleKeys: ["bust"],
          currentStep: "bust",
          totalShown: 0,
          readyForNext: true,
          originalTotal: 0,
          reducedTotal: 0,
          reducedTotalVisible: false
        }
      };
    }

    function buildSideSummaryState(title, damage, label, winnerClass) {
      return {
        title,
        winnerClass,
        winnerLabel: label,
        lines: damage.lines,
        visibleKeys: [],
        currentStep: null,
        totalShown: 0,
        readyForNext: false,
        originalTotal: damage.originalTotal ?? damage.total,
        reducedTotal: damage.total,
        reducedTotalVisible: false
      };
    }

    function buildSummarySteps(playerLines, enemyLines, winnerClass) {
      const ordered = ["base", "memoryPhoto", "runSuit", "runRank", "suit", "combo", "runCombo", "stageFlow", "blackjack", "runBlackjack", "roundWin"];
      return ordered.filter(step => step === "roundWin" ? winnerClass !== "draw" : playerLines.some(line => line.key === step) || enemyLines.some(line => line.key === step));
    }

    function runRoundSummarySequence(enemyAfter, playerAfter) {
      const summary = state.roundSummary;
      if (!summary) {
        return;
      }
      if (summary.steps.length === 0) {
        finishRoundDamage(enemyAfter, playerAfter);
        return;
      }
      summary.currentStepIndex = 0;
      applySummaryStep();
      render();
      scheduleNextSummaryStep(enemyAfter, playerAfter);
    }

    function scheduleNextSummaryStep(enemyAfter, playerAfter) {
      const summary = state.roundSummary;
      if (!summary) {
        return;
      }
      if (summary.currentStepIndex >= summary.steps.length - 1) {
        setTimeout(() => {
          finishRoundDamage(enemyAfter, playerAfter);
        }, 950);
        return;
      }
      setTimeout(() => {
        const activeSummary = state.roundSummary;
        if (!activeSummary) {
          return;
        }
        activeSummary.currentStepIndex += 1;
        applySummaryStep();
        render();
        scheduleNextSummaryStep(enemyAfter, playerAfter);
      }, 950);
    }

    function applySummaryStep() {
      const summary = state.roundSummary;
      const step = summary.steps[summary.currentStepIndex];
      for (const side of [summary.player, summary.enemy]) {
        side.currentStep = step;
        if (!side.visibleKeys.includes(step) && side.lines.some(line => line.key === step)) {
          side.visibleKeys.push(step);
        }
        side.totalShown = side.lines
          .filter(line => side.visibleKeys.includes(line.key))
          .reduce((sum, line) => sum + line.amount, 0);
      }
    }

    function finishRoundDamage(enemyAfter, playerAfter) {
      const summary = state.roundSummary;
      if (!summary || summary.appliedDamage) {
        return;
      }
      const battle = state.battle;
      const pending = state.pendingRoundResult;
      if (!pending || pending.type === "draw-reset") {
        summary.player.readyForNext = true;
        summary.enemy.readyForNext = true;
        render();
        return;
      }
      summary.appliedDamage = true;
      if (summary.winnerClass === "player") {
        summary.enemy.reducedTotalVisible = summary.enemy.originalTotal !== summary.enemy.reducedTotal;
      }
      if (summary.winnerClass === "enemy") {
        summary.player.reducedTotalVisible = summary.player.originalTotal !== summary.player.reducedTotal;
      }
      battle.enemy.recentDamage = pending.enemyDamage;
      battle.player.recentDamage = pending.playerDamage;
      battle.enemy.hp = pending.enemyAfter;
      battle.player.hp = pending.playerAfter;
      state.player.currentHp = pending.playerAfter;
      animateHpBars(pending.enemyAfter, pending.playerAfter, () => {
        summary.player.readyForNext = true;
        summary.enemy.readyForNext = true;
        render();
      });
    }

    function animateHpBars(targetEnemyHp, targetPlayerHp, onComplete) {
      if (!state.battle) {
        if (onComplete) {
          onComplete();
        }
        return;
      }
      cancelAnimationFrame(hpAnimationFrame);
      const battle = state.battle;
      const startEnemyHp = battle.enemy.displayHp;
      const startPlayerHp = battle.player.displayHp;
      const duration = 760;
      const startedAt = performance.now();
      isHpAnimating = true;

      function step(now) {
        const progress = Math.min(1, (now - startedAt) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        battle.enemy.displayHp = Math.round(startEnemyHp + (targetEnemyHp - startEnemyHp) * eased);
        battle.player.displayHp = Math.round(startPlayerHp + (targetPlayerHp - startPlayerHp) * eased);
        render();
        if (progress < 1) {
          hpAnimationFrame = requestAnimationFrame(step);
          return;
        }
        battle.enemy.displayHp = targetEnemyHp;
        battle.player.displayHp = targetPlayerHp;
        isHpAnimating = false;
        render();
        if (onComplete) {
          onComplete();
        }
      }

      hpAnimationFrame = requestAnimationFrame(step);
    }

    function highlightedIndexes(sideSummary, step) {
      if (!sideSummary || !step) {
        return [];
      }
      const line = sideSummary.lines.find(item => item.key === step);
      return line?.indices || [];
    }

    function shouldFlashName(summary, sideName, step) {
      if (!summary || step !== "roundWin" || summary.winnerClass !== sideName) {
        return false;
      }
      return true;
    }

    function uniqueIndexes(indexes) {
      return [...new Set(indexes)];
    }
  </script>
